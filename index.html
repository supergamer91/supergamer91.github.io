const W=800, H=450;
const c=document.getElementById('c');
const ctx=c.getContext('2d');
const DPR=window.devicePixelRatio||1;
c.width=W*DPR; c.height=H*DPR;
ctx.scale(DPR,DPR);

function resize(){
  const aspect=W/H,ww=window.innerWidth,wh=window.innerHeight;
  let sw=ww,sh=wh;
  if(ww/wh>aspect) sw=sh*aspect; else sh=sw/aspect;
  c.style.width=sw+'px'; c.style.height=sh+'px';
}
window.addEventListener('resize',resize); resize();

// ===== AUDIO =====
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,type,dur,vol=0.08){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}
const SFX={
  shoot:()=>beep(900,'square',0.04,0.05),
  hurt:()=>beep(200,'sawtooth',0.15,0.1),
  item:()=>{beep(500,'sine',0.1,0.1);setTimeout(()=>beep(700,'sine',0.1,0.1),80);},
  kill:()=>beep(300,'square',0.08,0.06),
  jump:()=>beep(400,'sine',0.08,0.05),
  boss:()=>beep(80,'sawtooth',1.0,0.2),
  level:()=>{beep(600,'sine',0.2);setTimeout(()=>beep(800,'sine',0.2),100);setTimeout(()=>beep(1000,'sine',0.3),200);},
  die:()=>beep(150,'sawtooth',0.8,0.15),
  ability:()=>beep(660,'triangle',0.12,0.1),
  special:()=>{beep(440,'sawtooth',0.08,0.12);setTimeout(()=>beep(550,'sine',0.15,0.1),60);}
};

// ===== INPUT =====
const keys={};
const mouse={x:W/2,y:H/2,down:false};
document.addEventListener('keydown',e=>{keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
c.addEventListener('mousemove',e=>{
  const r=c.getBoundingClientRect();
  mouse.x=(e.clientX-r.left)*(W/r.width);
  mouse.y=(e.clientY-r.top)*(H/r.height);
});
c.addEventListener('mousedown',()=>{mouse.down=true;AC.resume();});

// ===== MATH =====
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const rand=(mn,mx)=>Math.random()*(mx-mn)+mn;
const choice=arr=>arr[Math.floor(Math.random()*arr.length)];

// ===== PARTICLES =====
let particles=[];
function burst(x,y,n,col,spd=4,life=35){
  for(let i=0;i<n;i++){
    const a=rand(0,Math.PI*2),s=rand(1,spd);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,ml:life,col,sz:rand(2,5)});
  }
}
function tickParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;return p.life>0;
  });
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/p.ml;
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-cam.x,p.y-cam.y,p.sz,p.sz);
  }
  ctx.globalAlpha=1;
}

// ===== SCREEN SHAKE =====

const addShake=v=>shake=Math.max(shake,v);

    ctx.fillStyle='#ffca28';ctx.beginPath();ctx.arc(cx+ch.w/2,cy+ch.h/2-3,3,Math.PI,Math.PI*2);ctx.fill(); // lock arch

// ===== LEVEL GENERATION (Risk of Rain 1 inspired open world) =====
// Only floor, ceiling, and left/right boundary walls are solid.
// ALL mid-level platforms are semi-solid (land on top, drop through with S).
// No vertical solid walls anywhere in the traversal path.
let chestPositions=[];
function genLevel(){
  const pl=[];
  chestPositions=[];
  const F=LH-TILE;  // floor y = 568
  const T=TILE;     // 32

  // Semi-solid platform row helper
  const P=(x,y,tiles)=>{
    for(let i=0;i<tiles;i++)
      pl.push({x:x+i*T,y,w:T,h:T,solid:false,semi:true});
  };
  // Solid tile helper (floor/ceiling/boundary only)
  const S=(x,y,w=1,h=1)=>{
    for(let xi=0;xi<w;xi++) for(let yi=0;yi<h;yi++)
      pl.push({x:x+xi*T,y:y+yi*T,w:T,h:T,solid:true,semi:false});
  };
  const C=(x,y)=>chestPositions.push({x,y});

  // ── SOLID BOUNDARIES ─────────────────────────────────────────────
  for(let x=0;x<LW;x+=T){ S(x,F); S(x,0); }   // floor + ceiling
  for(let y=T;y<LH;y+=T){ S(0,y); S(LW-T,y); } // left + right walls

  // ════════════════════════════════════════════════════════════════
  // ZONE 1: Crash site / open plains  (x 100–1600)
  // Gentle intro — low ledges, easy jumps
  // ════════════════════════════════════════════════════════════════
  P(160,  F-96,  5);               // low shelf
  P(380,  F-192, 4);
  P(600,  F-288, 5); C(696, F-324);
  P(860,  F-192, 4);
  P(1060, F-320, 6); C(1124, F-356);
  P(1300, F-192, 4);
  P(1480, F-96,  5);

  // ════════════════════════════════════════════════════════════════
  // ZONE 2: Elevated ridge  (x 1700–3000)
  // Rising staircase then descend, a couple high secrets
  // ════════════════════════════════════════════════════════════════
  P(1700, F-128, 4);
  P(1900, F-224, 4);
  P(2100, F-352, 5); C(2196, F-388);
  P(2340, F-256, 4);
  P(2540, F-416, 6); C(2636, F-452); // high reward
  P(2780, F-288, 4);
  P(2960, F-160, 5);

  // Side secret high up (reachable with double jump from 2540 platform)
  P(2460, F-480, 3); C(2492, F-516);

  // ════════════════════════════════════════════════════════════════
  // ZONE 3: Industrial ruins  (x 3100–4600)
  // Dense multi-tier, zigzag traversal
  // ════════════════════════════════════════════════════════════════
  P(3100, F-128, 4);
  P(3300, F-256, 4);
  P(3500, F-384, 5); C(3596, F-420);
  P(3740, F-256, 4);
  P(3940, F-352, 5); C(4036, F-388);
  P(4180, F-192, 4);
  P(4380, F-320, 5);
  P(4560, F-128, 4);

  // Upper bridge run across zone 3
  P(3200, F-448, 8); C(3424, F-484);
  P(3900, F-448, 6);

  // ════════════════════════════════════════════════════════════════
  // ZONE 4: Floating rock field  (x 4700–6100)
  // Irregular heights, gaps, mid-air hops — RoR1 "desolate forest" feel
  // ════════════════════════════════════════════════════════════════
  P(4740, F-160, 3);
  P(4900, F-288, 4); C(4964, F-324);
  P(5080, F-192, 3);
  P(5240, F-352, 4); C(5336, F-388);
  P(5420, F-224, 5);
  P(5640, F-416, 4); C(5704, F-452);
  P(5840, F-256, 4);
  P(6020, F-352, 4);
  P(5760, F-480, 3); C(5792, F-516); // high secret

  // ════════════════════════════════════════════════════════════════
  // ZONE 5: Alien temple / boss arena  (x 6200–7800)
  // Dramatic tiered structure, wide open for boss fight
  // ════════════════════════════════════════════════════════════════
  P(6220, F-128, 5);
  P(6460, F-256, 5);
  P(6700, F-384, 6); C(6796, F-420);
  P(6940, F-256, 4);
  P(7140, F-416, 5); C(7236, F-452);
  P(7380, F-288, 6); C(7508, F-324);

  // Upper tier of temple
  P(6600, F-480, 5); C(6696, F-516);
  P(7000, F-480, 6);
  P(7320, F-480, 5);

  // Teleporter plinth — wide semi-solid platform near the end
  P(7560, F-160, 6); C(7688, F-196);

  return pl;
}

// Spawn chests at generated positions (called after genLevel)
function spawnLevelChests(){
  chests=[];
  for(const cp of chestPositions){
    chests.push({x:cp.x,y:cp.y,w:32,h:32,opened:false,bob:0});
  }
}
function resolveCol(e){
  e.onGround=false;
  e.y+=e.vy; e.x+=e.vx;
  e.x=clamp(e.x,TILE,LW-TILE-e.w);
  for(const p of platforms){
    if(e.x+e.w<=p.x||e.x>=p.x+p.w||e.y+e.h<=p.y||e.y>=p.y+p.h) continue;
    if(p.semi){
      // One-way: only land on top when falling downward and feet were above platform top
      const prevBottom=e.y+e.h-e.vy; // where feet were last frame
      if(e.vy>=0&&prevBottom<=p.y+4&&!e.dropThrough){
        e.y=p.y-e.h; e.vy=0; e.onGround=true;
      }
    } else {
      // Solid: full AABB resolution
      const ox=Math.min(e.x+e.w,p.x+p.w)-Math.max(e.x,p.x);
      const oy=Math.min(e.y+e.h,p.y+p.h)-Math.max(e.y,p.y);
      if(ox<oy){e.x=e.x<p.x?p.x-e.w:p.x+p.w;e.vx=0;}
      else{if(e.y<p.y){e.y=p.y-e.h;e.vy=0;e.onGround=true;}else{e.y=p.y+p.h;e.vy=0;}}
    }
  }
  if(e.y+e.h>=LH-TILE){e.y=LH-TILE-e.h;e.vy=0;e.onGround=true;}
  if(e.y<=TILE){e.y=TILE;e.vy=0;}
}

// ===== CAMERA =====
const cam={x:0,y:0};
function updateCam(p){
  const tx=clamp(p.x-W/2+p.w/2,0,LW-W);
  const ty=clamp(p.y-H*0.55+p.h/2,0,LH-H);
  cam.x=lerp(cam.x,tx,0.12);
  cam.y=lerp(cam.y,ty,0.12);
  if(shake>0){cam.x+=rand(-shake,shake);cam.y+=rand(-shake,shake);shake*=0.82;if(shake<0.1)shake=0;}
}

// ===== DROPS & ITEM SELECTION =====
let drops=[];
let levelUpItemChoices=null; // {choices:[itm,itm,itm], selected:null}

function dropItem(x,y,itm){
  drops.push({x:x-12,y:y-16,w:24,h:24,itm,vy:-3,onGround:false,baseY:y-16,bob:0});
}

function giveRandomItem(rar='common'){
  const pool=ITEMS.filter(i=>i.rar===rar);
  return choice(pool);
}

function offerLevelUpItems(){
  // Offer 3 random items weighted toward rarity
  const choices=[];
  const rarityRoll=()=>{const r=Math.random();return r<0.6?'common':r<0.88?'uncommon':r<0.98?'rare':'boss';};
  while(choices.length<3){
    const rar=rarityRoll();
    const pool=ITEMS.filter(i=>i.rar===rar);
    const itm=choice(pool);
    if(!choices.find(c=>c.id===itm.id)) choices.push(itm);
  }
  levelUpItemChoices={choices,selected:null};
}

function spawnEnemy(type,x,y){
  const d=ETYPES[type];if(!d) return null;
  const diff=getDiff();
  const hmul=1+diff*0.45,dmul=1+diff*0.22;
  const e={...d,type,x,y,vx:0,vy:0,onGround:false,
    hp:Math.ceil(d.hp*hmul),maxHp:Math.ceil(d.hp*hmul),
    dmg:Math.ceil(d.dmg*dmul),atkTimer:0,hurtTimer:0,alive:true,
    faceL:false,timer:0,state:'chase',
    poison:null,bleed:null,stun:0};
  if(type==='worm'||type==='colossus'){e.segs=[];for(let i=0;i<18;i++)e.segs.push({x,y});}
  enemies.push(e);return e;
}

function getDiff(){return Math.floor(gTimer/1800);} // difficulty tick every 30s
function getSpawnCd(){return Math.max(35,120-getDiff()*12);} // starts at 2s, goes to ~0.6s
function getPool(){
  const d=getDiff();
  if(d===0) return ['lemurian','lemurian','beetle','archer','floater'];
  if(d===1) return ['lemurian','beetle','wisp','archer','floater','spitter'];
  if(d===2) return ['lemurian','wisp','golem','jellyfish','archer','brute','phantasm','spitter'];
  return ['lemurian','wisp','golem','elderlem','jellyfish','archer','brute','knight','phantasm','spitter','floater'];

// ===== SHOOT =====
function shoot(){
  if(player.atkCd>0) return;
  if(levelUpItemChoices) return; // Paused for item selection
  const ch=CHARACTERS[player.charType];
  const wp=ch.weapon;
  const cx=player.x+player.w/2,cy=player.y+player.h*0.4;
  const wx=mouse.x+cam.x,wy=mouse.y+cam.y;

  if(wp.melee){
    // Melee swing
    const dir=player.faceL?-1:1;
    let hit=false;
    for(const e of enemies){
      if(!e.alive) continue;
      const d=dist({x:e.x+e.w/2,y:e.y+e.h/2},{x:cx,y:cy});
      if(d<wp.meleeRange){
        const mul=player.chargedShot?4:1;
        processHit(e,Math.ceil(wp.dmg*mul),player.chargedShot);
        if(wp.poison&&!e.poison) e.poison={stacks:0,timer:0};
        if(wp.poison) e.poison.stacks=Math.min((e.poison.stacks||0)+3,15);
        hit=true;
      }
    }
    if(hit){
      burst(cx+dir*35,cy,8,wp.projCol,5,18);
      player.chargedShot=false;
    }
    SFX.shoot();
  } else if(wp.isGrenade){
    const angle=Math.atan2(wy-cy,wx-cx);
    const mul=player.chargedShot?4:1;
    fireProj(cx,cy,Math.cos(angle)*wp.projSpd,Math.sin(angle)*wp.projSpd,wp.dmg*mul,
      wp.projCol,'player',{life:wp.projLife,w:wp.projW,h:wp.projH,isGrenade:true,bouncy:wp.bouncy,isCrit:player.chargedShot});
    player.chargedShot=false;
    SFX.shoot();
  } else {
    const angle=Math.atan2(wy-cy,wx-cx);
    const shots=1+(player.extraShots||0);
    const isCrit=Math.random()<player.crit;
    const mul=player.chargedShot?4:(isCrit?1.6:1);
    const dmg=Math.ceil(wp.dmg*mul);
    for(let s=0;s<shots;s++){
      const spread=(s-(shots-1)/2)*wp.spread;
      const nearestEnemy=wp.homing?enemies.filter(e=>e.alive).sort((a,b)=>dist({x:cx,y:cy},{x:a.x+a.w/2,y:a.y+a.h/2})-dist({x:cx,y:cy},{x:b.x+b.w/2,y:b.y+b.h/2}))[0]:null;
      fireProj(cx,cy,Math.cos(angle+spread)*wp.projSpd,Math.sin(angle+spread)*wp.projSpd,
        dmg,isCrit?'#ffeb3b':wp.projCol,'player',
        {isCrit,life:wp.projLife,w:wp.projW,h:wp.projH,homing:wp.homing&&!!nearestEnemy,target:nearestEnemy});
    }
    if(player.chargedShot) burst(cx,cy,10,'#ffeb3b',5,20);
    player.chargedShot=false;
    SFX.shoot();
  }
  player.atkCd=Math.ceil(wp.cd*player.atkSpd);
  player.faceL=(wx<cx);
}

function processHit(e,dmg,isCrit){
  if(!e||!e.alive) return;
  let d=dmg;
  if(player.crowbars&&e.hp/e.maxHp>0.9) d=Math.ceil(d*(1+0.75*player.crowbars));
  if(e.scorpionShred) d=Math.ceil(d*(1+e.scorpionShred*0.15));
  // Death Mark: 4+ debuffs
  let debuffs=0;
  if(e.poison&&e.poison.stacks>0) debuffs++;
  if(e.bleed&&e.bleed.stacks>0) debuffs++;
  if(e.stun>0) debuffs++;
  if(e.scorpionShred) debuffs++;
  if(player.deathMark&&debuffs>=4) d=Math.ceil(d*1.5);

  e.hp-=d; e.hurtTimer=8;
  burst(e.x+e.w/2,e.y+e.h/2,4,'#ef5350',4,18);
  popNum(e.x+e.w/2,e.y,d.toString()+(isCrit?'!':''),isCrit?'#ffeb3b':'#fff');
  if(player.ukulele&&Math.random()<0.25) chainLightning(e,Math.ceil(d*0.5),2+player.ukulele);
  if(player.missiles&&Math.random()<0.1*player.missiles){
    const tgt=e;
    fireProj(player.x+player.w/2,player.y,0,-4,dmg*3,'#ff5722','player',{isMissile:true,homing:true,target:tgt,life:120,w:8,h:8});
  }
  if(player.behemoth){
    for(const e2 of enemies){
      if(e2===e||!e2.alive) continue;
      if(dist({x:e2.x+e2.w/2,y:e2.y+e2.h/2},{x:e.x+e.w/2,y:e.y+e.h/2})<90){
        e2.hp-=Math.ceil(d*0.55);e2.hurtTimer=5;
      }
    }
    burst(e.x+e.w/2,e.y+e.h/2,12,'#ff7043',7,22);
  }
  if(isCrit&&player.runald){
    fireProj(e.x+e.w/2,e.y,0,-8,Math.ceil(d*0.5),'#bbdefb','player',{life:50,w:14,h:10,isIce:true});
  }
  if(isCrit&&player.kjaro){
    burst(e.x+e.w/2,e.y+e.h/2,14,'#ff8f00',7,30);
    for(const e2 of enemies){
      if(!e2.alive) continue;
      if(dist({x:e2.x+e2.w/2,y:e2.y+e2.h/2},{x:e.x+e.w/2,y:e.y+e.h/2})<70) e2.hp-=Math.ceil(d*0.4);
    }
  }
  if(player.scorpion>0){
    e.scorpionShred=(e.scorpionShred||0)+player.scorpion*0.1;
  }
  if(isCrit&&player.predatory) player.atkCd=Math.max(0,player.atkCd-8);
  if(e.hp<=0) killEnemy(e);
}

function chainLightning(src,dmg,bounces){
  const segs=[],used=new Set([src]);let cur=src;
  for(let i=0;i<bounces;i++){
    let near=null,nd=220;
    for(const e of enemies){
      if(!e.alive||used.has(e)) continue;
      const dd=dist({x:e.x+e.w/2,y:e.y+e.h/2},{x:cur.x+cur.w/2,y:cur.y+cur.h/2});
      if(dd<nd){nd=dd;near=e;}
    }
    if(!near) break;
    segs.push({ax:cur.x+cur.w/2,ay:cur.y+cur.h/2,bx:near.x+near.w/2,by:near.y+near.h/2});
    near.hp-=dmg;near.hurtTimer=5;
    if(near.hp<=0) killEnemy(near);
    used.add(near);cur=near;
  }
  if(segs.length) lightnings.push({segs,life:12});
}

function killEnemy(e){
  if(!e.alive) return;
  e.alive=false;
  const cx=e.x+e.w/2,cy=e.y+e.h/2;
  burst(cx,cy,22,e.col,7,45);burst(cx,cy,8,'#fff',3,18);
  SFX.kill();
  player.xp+=e.xp;player.score+=e.score;player.kills++;
  if(player.infusion&&Math.random()<0.06*player.infusion){player.maxHp++;player.hp=Math.min(player.hp+1,player.maxHp);}
  if(player.willowisp){burst(cx,cy,20,'#ff6d00',9,40);for(const e2 of enemies){if(e2.alive&&dist({x:e2.x,y:e2.y},{x:cx,y:cy})<80){processHit(e2,18,false);}}}
  if(player.harpoon){player.spd=Math.min(player.spd+0.3,12);setTimeout(()=>{player.spd=Math.max(player.spd-0.3,CHARACTERS[player.charType].spd);},1500);}
  if(player.monsterTooth) healOrbs.push({x:cx,y:cy,vy:-4,life:120,val:8*player.monsterTooth});
  if(player.topaz){player.shield=Math.min((player.shield||0)+15,player.maxShield+100);}
  if(player.bandolier&&Math.random()<player.bandolier){
    for(const sc of player.skillCds) sc.cur=0;
    popNum(player.x+player.w/2,player.y-14,'RELOAD!','#ffcc02');
  }
  // Kill-related effects
  if(player.queens>0&&Math.random()<0.12) spawnEnemy('beetle',cx+rand(-40,40),cy-20);// Beetle guard ally approximation
  // Drop item
  if(Math.random()<0.15){
    const r=Math.random();
    const pool=r<0.60?ITEMS.filter(i=>i.rar==='common'):r<0.88?ITEMS.filter(i=>i.rar==='uncommon'):r<0.97?ITEMS.filter(i=>i.rar==='rare'):ITEMS.filter(i=>i.rar==='boss');
    dropItem(cx,cy-10,choice(pool));
  }
  // Daggers
  if(player.daggers){
    const tgt=enemies.find(ex=>ex.alive);
    if(tgt){
      for(let i=0;i<player.daggers;i++){
        const a=Math.atan2(tgt.y-cy,tgt.x-cx);
        fireProj(cx,cy,Math.cos(a)*9,Math.sin(a)*9,22,'#e040fb','player',{homing:true,target:tgt,life:100,w:5,h:5});
      }
    }
  }
  // XP levelup
  while(player.xp>=player.xpNext){
    player.xp-=player.xpNext;player.lvl++;
    player.xpNext=Math.ceil(player.xpNext*1.6);
    player.maxHp+=10;player.hp=Math.min(player.hp+20,player.maxHp);
    burst(player.x+player.w/2,player.y-10,30,'#ffeb3b',6,60);
    SFX.level();lvlMsg={txt:'LEVEL UP! +10 HP',life:80};
  }
  if(e.isBoss){
    addShake(18);boss=null;tele.bossDead=true;
    burst(cx,cy,80,'#ffd700',12,90);
    for(let i=0;i<5;i++) dropItem(cx+rand(-80,80),cy-10,choice(ITEMS.filter(x=>x.rar==='rare'||x.rar==='boss')));
  }
}

function hurtPlayer(dmg){
  if(!player.alive||player.invincible>0) return;
  // Armor reduction
  const actualDmg=Math.max(1,Math.ceil(dmg*(1-Math.min(0.8,player.armor*0.01))));
  // Shield absorbs first
  if(player.shield>0){
    const absorbed=Math.min(player.shield,actualDmg);
    player.shield-=absorbed;
    if(absorbed>=actualDmg) return;
    dmg=actualDmg-absorbed;
  } else {dmg=actualDmg;}
  if(player.block&&Math.random()<player.block){
    popNum(player.x,player.y-8,'BLOCKED','#76ff03');return;
  }
  player.hp-=dmg;player.hurtTimer=16;
  addShake(4);SFX.hurt();
  popNum(player.x,player.y-8,dmg.toString(),'#ff1744');
  // Spike armor
  if(player.spikedArmor){
    const nearest=enemies.filter(e=>e.alive).sort((a,b)=>dist({x:player.x,y:player.y},{x:a.x,y:a.y})-dist({x:player.x,y:player.y},{x:b.x,y:b.y}))[0];
    if(nearest) nearest.hp-=Math.ceil(dmg*player.spikedArmor);
  }
  // Stealth kit
  if(player.stealthkit&&Math.random()<0.4*player.stealthkit){
    player.stealthed=90;player.invincible=90;
    popNum(player.x,player.y-16,'STEALTH!','#e8eaf6');
  }
  if(player.hp<=0){
    player.hp=0;player.alive=false;SFX.die();
    burst(player.x+player.w/2,player.y+player.h/2,50,'#4fc3f7',9,65);
    setTimeout(()=>{state='dead';},1400);
  }
}

// ===== UPDATE FUNCTIONS =====
function tickPlayer(){
  if(!player.alive) return;
  if(levelUpItemChoices) return; // Pause movement during item select

  player.invincible=Math.max(0,player.invincible-1);
  player.stealthed=Math.max(0,player.stealthed-1);
  if(player.shielded>0){player.shielded--;if(player.shielded<=0)player.invincible=0;}

  let mv=0;
  if(keys['ArrowLeft']||keys['KeyA']){player.vx=-player.spd;player.faceL=true;mv=1;}
  if(keys['ArrowRight']||keys['KeyD']){player.vx=player.spd;player.faceL=false;mv=1;}
  if(!mv){player.vx*=0.78;player.fungusStand++;} else {player.fungusStand=0;}
  player.animT+=Math.abs(player.vx)*0.04;

  if((keys['Space']||keys['ArrowUp']||keys['KeyW'])&&player.jumps>0){
    if(!player.jumpHeld){player.vy=-10.5;player.jumps--;player.jumpHeld=true;SFX.jump();burst(player.x+player.w/2,player.y+player.h,5,'#90caf9',2,15);}
  }else player.jumpHeld=false;

  // Caustic leap landing
  if(player.causticLeap&&player.onGround){
    player.causticLeap=false;
    burst(player.x+player.w/2,player.y+player.h,25,'#69f0ae',8,40);
    for(const e of enemies){
      if(!e.alive) continue;
      const d=dist({x:e.x+e.w/2,y:e.y+e.h/2},{x:player.x+player.w/2,y:player.y+player.h});
      if(d<110){
        processHit(e,20,false);
        if(!e.poison) e.poison={stacks:0,timer:0};
        e.poison.stacks=Math.min(e.poison.stacks+5,15);
      }
    }
  }

  // Dash rush
  if(player.dashRush){
    player.dashRush.frames--;
    for(const e of enemies){
      if(!e.alive) continue;
      const d=dist({x:e.x+e.w/2,y:e.y+e.h/2},{x:player.x+player.w/2,y:player.y+player.h/2});
      if(d<50) processHit(e,player.dashRush.dmg,true);
    }
    if(player.dashRush.frames<=0) player.dashRush=null;
  }

  player.vy=clamp(player.vy+0.52,-14,15);
  // Drop through semi-solid platforms when holding S or Down
  player.dropThrough=!!(keys['KeyS']||keys['ArrowDown']);
  if(player.dropThrough&&player.onGround) player.y+=2; // nudge below surface
  resolveCol(player);
  if(player.onGround){player.jumps=2;player.dropThrough=false;}

  if(mouse.down) shoot();
  player.atkCd=Math.max(0,player.atkCd-1);
  player.hurtTimer=Math.max(0,player.hurtTimer-1);

  // Regen
  player.regenT++;
  if(player.regenT>=60){player.regenT=0;player.hp=Math.min(player.maxHp,player.hp+player.regen);}

  // Fungus
  if(player.fungus&&player.fungusStand>120) player.hp=Math.min(player.maxHp,player.hp+0.05*player.fungus);

  // Shield regen (5/sec)
  if(player.maxShield>0) player.shield=Math.min(player.maxShield,player.shield+0.083);

  // Heal orbs
  for(let i=healOrbs.length-1;i>=0;i--){
    const o=healOrbs[i];
    o.y+=o.vy; o.vy+=0.3; o.life--;
    const pd=dist({x:player.x+player.w/2,y:player.y+player.h/2},{x:o.x,y:o.y});
    if(pd<30||o.life<=0){
      if(pd<30){player.hp=Math.min(player.maxHp,player.hp+o.val);popNum(player.x,player.y-10,'+'+o.val,'#69f0ae');}
      healOrbs.splice(i,1);
    }
  }

  // Skill keys
  const ch=CHARACTERS[player.charType];
  const skillKeys=['KeyQ','KeyE','KeyR'];
  for(let i=0;i<3;i++){
    if(keys[skillKeys[i]]&&player.skillCds[i].cur<=0){
      ch.skills[i].use(player);
      player.skillCds[i].cur=player.skillCds[i].max;
      keys[skillKeys[i]]=false; // consume key
    }
    player.skillCds[i].cur=Math.max(0,player.skillCds[i].cur-1);
  }

  // F to activate teleporter (interact key – separate from skill keys)
  const td=dist({x:player.x+player.w/2,y:player.y+player.h/2},{x:tele.x+32,y:tele.y+32});
  if(keys['KeyF']&&td<110&&!tele.active){tele.active=true;keys['KeyF']=false;}

  // F to open nearby chest
  if(keys['KeyF']){
    for(let ci=chests.length-1;ci>=0;ci--){
      const ch=chests[ci];
      if(ch.opened) continue;
      const pd=dist({x:player.x+player.w/2,y:player.y+player.h/2},{x:ch.x+ch.w/2,y:ch.y+ch.h/2});
      if(pd<90){
        ch.opened=true;
        keys['KeyF']=false;
        offerLevelUpItems();
        SFX.item();
        burst(ch.x+ch.w/2,ch.y+ch.h/2,24,'#ffd54f',8,45);
        break;
      }
    }
  }

  // Pick up items
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];
    if(player.x<d.x+d.w&&player.x+player.w>d.x&&player.y<d.y+d.h&&player.y+player.h>d.y){
      d.itm.apply(player);player.items.push(d.itm);
      drops.splice(i,1);SFX.item();
      burst(d.x+d.w/2,d.y+d.h/2,14,d.itm.col,4,28);
      itemMsg={txt:d.itm.name,desc:d.itm.desc,col:d.itm.col,life:200};
    }
  }

  // Mines: check player-enemy contact via separate function
  tickMines();
  tickTornadoes();
  tickTurrets();
}

function tickMines(){
  for(let i=mines.length-1;i>=0;i--){
    const m=mines[i];
    if(m.armed>0){m.armed--;continue;}
    if(m.exploded){mines.splice(i,1);continue;}
    for(const e of enemies){
      if(!e.alive) continue;
      if(e.x+e.w>m.x&&e.x<m.x+m.w&&e.y+e.h>m.y&&e.y<m.y+m.h){
        m.exploded=true;
        burst(m.x+m.w/2,m.y,30,'#ff9800',8,45);addShake(6);
        const dmg=m.dmg||45;
        for(const e2 of enemies){
          if(!e2.alive) continue;
          if(dist({x:e2.x+e2.w/2,y:e2.y+e2.h/2},{x:m.x+m.w/2,y:m.y+m.h/2})<80){
            processHit(e2,dmg,false);
            if(m.stunBomb){e2.stun=90;e2.vx=0;e2.vy=-3;}
          }
        }
        break;
      }
    }
  }
}

function tickTornadoes(){
  for(let i=tornadoes.length-1;i>=0;i--){
    const t=tornadoes[i];
    t.life--;t.x+=t.dir*0.8;t.dmgCd=Math.max(0,t.dmgCd-1);
    if(t.life<=0){tornadoes.splice(i,1);continue;}
    if(t.dmgCd<=0){
      for(const e of enemies){
        if(!e.alive) continue;
        if(dist({x:e.x+e.w/2,y:e.y+e.h/2},{x:t.x,y:t.y})<t.radius){
          processHit(e,12,false);e.vx+=(Math.random()-0.5)*8;e.vy-=3;
        }
      }
      t.dmgCd=30;
    }
  }
}

function tickTurrets(){
  for(let i=turrets.length-1;i>=0;i--){
    const t=turrets[i];
    t.life--;if(t.life<=0){turrets.splice(i,1);continue;}
    t.atkCd=Math.max(0,t.atkCd-1);
    // Gravity
    if(!t.onGround){t.vy=(t.vy||0)+0.5;t.y+=t.vy;}
    if(t.y+t.h>=LH-TILE){t.y=LH-TILE-t.h;t.onGround=true;}
    if(t.atkCd<=0){
      const nearest=enemies.filter(e=>e.alive).sort((a,b)=>dist({x:t.x+t.w/2,y:t.y+t.h/2},{x:a.x+a.w/2,y:a.y+a.h/2})-dist({x:t.x+t.w/2,y:t.y+t.h/2},{x:b.x+b.w/2,y:b.y+b.h/2}))[0];
      if(nearest&&dist({x:t.x+t.w/2,y:t.y+t.h/2},{x:nearest.x+nearest.w/2,y:nearest.y+nearest.h/2})<350){
        const tx2=nearest.x+nearest.w/2,ty2=nearest.y+nearest.h/2;
        const a=Math.atan2(ty2-(t.y+t.h/2),tx2-(t.x+t.w/2));
        fireProj(t.x+t.w/2,t.y+t.h/2,Math.cos(a)*12,Math.sin(a)*12,14,'#ea80fc','player',{life:70,w:5,h:5});
        t.atkCd=45;
      }
    }
  }
}

function tickEnemies(){
  const px=player.x+player.w/2,py=player.y+player.h/2;
  for(const e of enemies){
    if(!e.alive) continue;
    e.hurtTimer=Math.max(0,e.hurtTimer-1);
    e.atkTimer=Math.max(0,e.atkTimer-1);
    e.stun=Math.max(0,(e.stun||0)-1);
    e.timer++;

    // Poison tick
    if(e.poison&&e.poison.stacks>0){
      e.poison.timer++;
      if(e.poison.timer>=30){
        e.poison.timer=0;
        const pdmg=Math.ceil(e.poison.stacks*2);
        e.hp-=pdmg;e.hurtTimer=3;
        popNum(e.x+e.w/2,e.y,'PSN','#69f0ae');
        e.poison.stacks=Math.max(0,e.poison.stacks-1);
        if(e.hp<=0){killEnemy(e);continue;}
      }
    }
    // Bleed tick
    if(e.bleed&&e.bleed.stacks>0){
      e.bleed.timer=(e.bleed.timer||0)+1;
      if(e.bleed.timer>=20){
        e.bleed.timer=0;
        const bdmg=Math.ceil(e.bleed.stacks*3);
        e.hp-=bdmg;e.hurtTimer=3;
        popNum(e.x+e.w/2,e.y-8,'BLD','#f44336');
        e.bleed.stacks=Math.max(0,e.bleed.stacks-1);
        if(e.hp<=0){killEnemy(e);continue;}
      }
    }
    if(e.stun>0) continue; // stunned

    const ex=e.x+e.w/2,ey=e.y+e.h/2;
    const dp=dist({x:ex,y:ey},{x:px,y:py});

    if(e.type==='worm'||e.type==='colossus'){
      const flying=e.type==='colossus';
      e.vx=lerp(e.vx,(px>ex?1:-1)*e.spd+Math.sin(e.timer*0.04)*2,0.04);
      e.vy=lerp(e.vy,(py>ey?1:-1)*e.spd*(flying?0.8:0.5)+Math.cos(e.timer*0.03)*1.5,0.04);
      e.x=clamp(e.x+e.vx,0,LW-e.w);
      e.y=clamp(e.y+e.vy,50,LH-e.h);
      if(e.segs){
        for(let i=e.segs.length-1;i>0;i--){e.segs[i].x=lerp(e.segs[i].x,e.segs[i-1].x,0.28);e.segs[i].y=lerp(e.segs[i].y,e.segs[i-1].y,0.28);}
        if(e.segs.length){e.segs[0].x=lerp(e.segs[0].x,e.x,0.28);e.segs[0].y=lerp(e.segs[0].y,e.y,0.28);}
      }
      if(dp<65&&e.atkTimer<=0){hurtPlayer(e.dmg);e.atkTimer=e.atkCd;}
      if(e.atkTimer<=0){
        const a=Math.atan2(py-ey,px-ex);
        const projSpd=e.type==='colossus'?4.5:5.5;
        const projSize=e.type==='colossus'?14:10;
        const projCol=e.type==='colossus'?'#ce93d8':'#ff5722';
        fireProj(ex,ey,Math.cos(a)*projSpd,Math.sin(a)*projSpd,Math.ceil(e.dmg*0.7),projCol,'enemy',{life:90,w:projSize,h:projSize});
        e.atkTimer=e.atkCd;
      }
    } else if(e.type==='wisp'||e.type==='jellyfish'){
      const a=Math.atan2(py-ey,px-ex);
      e.vx=lerp(e.vx,Math.cos(a)*e.spd,0.04);
      e.vy=lerp(e.vy,Math.sin(a)*e.spd*0.6+Math.sin(e.timer*0.04)*0.5,0.04);
      e.x=clamp(e.x+e.vx,0,LW-e.w);e.y=clamp(e.y+e.vy,40,LH-e.h-60);
      e.faceL=e.vx<0;
      if(dp<e.atkRng&&e.atkTimer<=0){
        const a2=Math.atan2(py-ey,px-ex);
        const col=e.type==='jellyfish'?'#29b6f6':'#e040fb';
        fireProj(ex,ey,Math.cos(a2)*4.5,Math.sin(a2)*4.5,e.dmg,col,'enemy',{life:75,w:8,h:8});
        e.atkTimer=e.atkCd;
      }
    } else if(e.type==='elderlem'){
      e.vx=dp>e.atkRng?(px>ex?e.spd:-e.spd):e.vx*0.88;
      e.faceL=px<ex;
      e.vy=clamp(e.vy+0.52,-14,15);
      resolveCol(e);
      e.x=clamp(e.x,TILE*2,LW-TILE*2-e.w);
      if(e.onGround&&Math.abs(e.vx)<0.3&&dp<300) e.vy=-10;
      if(dp<e.atkRng&&e.atkTimer<=0){
        const a=Math.atan2(py-ey,px-ex);
        fireProj(ex,ey,Math.cos(a)*6.5,Math.sin(a)*6.5,e.dmg,'#ff6d00','enemy',{life:70,w:8,h:8});
        e.atkTimer=e.atkCd;
      }
    } else if(e.type==='floater'){
      // Hovers low (60-120px off floor), drifts toward player, melee on contact
      const targetY=LH-TILE-80-Math.sin(e.timer*0.03)*30;
      e.vx=lerp(e.vx,(px>ex?1:-1)*e.spd,0.05);
      e.vy=lerp(e.vy,(targetY<ey?-1:1)*0.8,0.06);
      e.x=clamp(e.x+e.vx,0,LW-e.w); e.y=clamp(e.y+e.vy,LH-TILE-140,LH-TILE-40);
      e.faceL=e.vx<0;
      if(dp<e.atkRng&&e.atkTimer<=0){hurtPlayer(e.dmg);e.atkTimer=e.atkCd;addShake(2);}
    } else if(e.type==='archer'){
      // Keeps distance; if too close backs off, fires arrows at range
      const prefDist=200;
      if(dp<prefDist-20) e.vx=(px>ex?-1:1)*e.spd; // back off
      else if(dp>prefDist+40) e.vx=(px>ex?1:-1)*e.spd*0.7; // approach
      else e.vx*=0.8; // hold
      e.faceL=px<ex;
      e.vy=clamp(e.vy+0.52,-14,15);
      resolveCol(e);
      e.x=clamp(e.x,TILE*2,LW-TILE*2-e.w);
      if(e.onGround&&Math.abs(e.vx)<0.5&&dp<300) e.vy=-9;
      if(dp<e.atkRng&&e.atkTimer<=0){
        const a=Math.atan2(py-ey,px-ex);
        fireProj(ex,ey,Math.cos(a)*7,Math.sin(a)*7,e.dmg,'#a5d6a7','enemy',{life:80,w:5,h:9});
        e.atkTimer=e.atkCd;
      }
    } else if(e.type==='brute'){
      // Charges when in range; massive melee damage
      e.faceL=px<ex;
      if(!e.charging){
        e.vx=(px>ex?1:-1)*e.spd*(dp<300?1:0.5);
        e.vy=clamp(e.vy+0.52,-14,15);
        resolveCol(e);
        e.x=clamp(e.x,TILE*2,LW-TILE*2-e.w);
        if(e.onGround&&Math.abs(e.vx)<0.5&&dp<350) e.vy=-9;
        // Wind up charge
        if(dp<220&&dp>e.atkRng&&e.atkTimer<=0){
          e.charging=true; e.chargeTimer=22;
          e.chargeDir=(px>ex?1:-1); burst(ex,ey,12,'#ff5722',6,25);
        }
      } else {
        e.chargeTimer--;
        e.vx=e.chargeDir*14;
        e.vy=clamp(e.vy+0.52,-14,15);
        resolveCol(e);
        if(dp<e.atkRng+10&&e.atkTimer<=0){hurtPlayer(e.dmg*1.5);e.atkTimer=e.atkCd;addShake(6);}
        if(e.chargeTimer<=0){e.charging=false;e.atkTimer=e.atkCd;}
      }
      if(dp<e.atkRng&&!e.charging&&e.atkTimer<=0){hurtPlayer(e.dmg);e.atkTimer=e.atkCd;addShake(4);}
    } else if(e.type==='knight'){
      // Walks toward player; raises shield (blocking) when player projectile is close
      e.faceL=px<ex;
      e.blocking=false;
      // Check if any player projectile is incoming
      for(const pr of projs){
        if(pr.owner==='player'&&dist({x:pr.x,y:pr.y},{x:ex,y:ey})<100&&Math.sign(pr.vx)===(px<ex?-1:1)){
          e.blocking=true; break;
        }
      }
      e.vx=dp>e.atkRng?(px>ex?e.spd:-e.spd):e.vx*0.82;
      if(e.blocking) e.vx*=0.3; // slow while blocking
      e.vy=clamp(e.vy+0.52,-14,15);
      resolveCol(e);
      e.x=clamp(e.x,TILE*2,LW-TILE*2-e.w);
      if(e.onGround&&Math.abs(e.vx)<0.5&&dp<300) e.vy=-10;
      if(dp<e.atkRng&&e.atkTimer<=0){hurtPlayer(e.dmg);e.atkTimer=e.atkCd;addShake(3);}
    } else if(e.type==='phantasm'){
      // Flies at mid-height (100-180px off floor), fires magic orbs
      const targetY=LH-TILE-140-Math.sin(e.timer*0.025)*30;
      e.vx=lerp(e.vx,(px>ex?1:-1)*e.spd*(dp>120?1:-0.5),0.05);
      e.vy=lerp(e.vy,(targetY<ey?-1:1)*1.2,0.06);
      e.x=clamp(e.x+e.vx,0,LW-e.w); e.y=clamp(e.y+e.vy,LH-TILE-200,LH-TILE-80);
      e.faceL=e.vx<0;
      if(dp<e.atkRng&&e.atkTimer<=0){
        const a=Math.atan2(py-ey,px-ex);
        fireProj(ex,ey,Math.cos(a)*5,Math.sin(a)*5,e.dmg,'#e040fb','enemy',{life:100,w:10,h:10});
        // Second orb slightly offset
        fireProj(ex,ey,Math.cos(a+0.25)*4.5,Math.sin(a+0.25)*4.5,e.dmg*0.7,'#ce93d8','enemy',{life:100,w:8,h:8});
        e.atkTimer=e.atkCd;
      }
    } else if(e.type==='spitter'){
      // Ground enemy; moves slowly, lobs acid blobs in arc
      e.vx=dp>180?(px>ex?e.spd:-e.spd):e.vx*0.85;
      e.faceL=px<ex;
      e.vy=clamp(e.vy+0.52,-14,15);
      resolveCol(e);
      e.x=clamp(e.x,TILE*2,LW-TILE*2-e.w);
      if(dp<e.atkRng&&e.atkTimer<=0){
        // Lob an arc shot: vx toward player, vy upward so it arcs
        const dx=px-ex, dy=py-ey;
        const t=Math.max(15,Math.min(40,Math.abs(dx)/8));
        const vx=dx/t, vy=dy/t-0.52*t/2;
        fireProj(ex,ey,vx,vy,e.dmg,'#cddc39','enemy',{life:t+20,w:10,h:10,isGrenade:true,bouncy:false});
        e.atkTimer=e.atkCd;
      }
    } else {
      // Lemurian / Golem / Beetle – standard ground melee
      e.vx=dp>e.atkRng?(px>ex?e.spd:-e.spd):e.vx*0.82;
      e.faceL=px<ex;
      e.vy=clamp(e.vy+0.52,-14,15);
      resolveCol(e);
      // Clamp enemies to their room so they can't wander through door gaps
      e.x=clamp(e.x,TILE*2,LW-TILE*2-e.w);
      if(e.onGround&&Math.abs(e.vx)<0.4&&dp<300) e.vy=-10;
      if(dp<e.atkRng&&e.atkTimer<=0){hurtPlayer(e.dmg);e.atkTimer=e.atkCd;addShake(2);}
    }
  }
}

function tickProjs(){
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];
    if(p.homing&&p.target&&p.target.alive){
      const tx=p.target.x+p.target.w/2,ty=p.target.y+p.target.h/2;
      const a=Math.atan2(ty-p.y,tx-p.x);
      p.vx=lerp(p.vx,Math.cos(a)*13,0.12);
      p.vy=lerp(p.vy,Math.sin(a)*13,0.12);
    }
    // Gravity for grenades
    if(p.isGrenade) p.vy+=p.gravity||0.4;
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>7) p.trail.shift();
    p.x+=p.vx;p.y+=p.vy;p.life--;

    // Bounce for grenades – only off the solid floor, not platforms (shots pass through)
    if(p.bouncy){
      if(p.y+p.h>=LH-TILE){
        if(p.bounced<2){p.vy=-Math.abs(p.vy)*0.6;p.vx*=0.8;p.y=LH-TILE-p.h-1;p.bounced++;}
        else{
          burst(p.x,p.y,18,'#ff9800',7,35);addShake(4);
          if(p.stunBomb){
            for(const e of enemies){if(!e.alive) continue;if(dist({x:e.x+e.w/2,y:e.y+e.h/2},{x:p.x,y:p.y})<90){processHit(e,p.dmg,false);e.stun=90;}}
          } else {
            for(const e of enemies){if(!e.alive) continue;if(dist({x:e.x+e.w/2,y:e.y+e.h/2},{x:p.x,y:p.y})<80){processHit(e,p.dmg,p.isCrit);}}
          }
          projs.splice(i,1);continue;
        }
      }
    }

    let hit=false;
    if(p.owner==='player'){
      for(const e of enemies){
        if(!e.alive) continue;
        if(!p.isGrenade&&p.x<e.x+e.w&&p.x+p.w>e.x&&p.y<e.y+e.h&&p.y+p.h>e.y){
          // Knight shield block: deflect proj if blocking and approaching from shield side (left)
          if(e.type==='knight'&&e.blocking&&p.vx<0){
            p.vx=-p.vx*0.6; p.vy+=rand(-2,2);
            burst(e.x-4,e.y+e.h/2,6,'#4fc3f7',4,18);
            popNum(e.x,e.y-8,'BLOCKED','#4fc3f7');
            hit=true; break;
          }
          processHit(e,p.dmg,p.isCrit);
          if(p.pierce) continue; // pierce through
          hit=true;break;
        }
      }
    } else if(p.owner==='enemy'){
      if(player.alive&&player.invincible<=0&&p.x<player.x+player.w&&p.x+p.w>player.x&&p.y<player.y+player.h&&p.y+p.h>player.y){
        hurtPlayer(p.dmg);hit=true;
      }
    }
    if(hit||p.life<=0||p.x<-50||p.x>LW+50||p.y<-100||p.y>LH+200) projs.splice(i,1);
  }
}

function tickDrops(){
  for(const d of drops){
    if(!d.onGround){d.vy=clamp(d.vy+0.4,-14,12);resolveCol(d);if(d.onGround)d.baseY=d.y;}
    d.bob++;
    if(d.onGround) d.y=d.baseY+Math.sin(d.bob*0.06)*3;
  }
}

function tickTele(){
  tele.glow++;
  if(tele.active&&!tele.bossSpawned){
    tele.bossSpawned=true;
    const bossType=stage%2===0?'colossus':'worm';
    boss=spawnEnemy(bossType,player.x+(player.faceL?-350:350),LH-180);
    if(boss) boss.x=clamp(boss.x,50,LW-100);
    SFX.boss();addShake(12);
    stageMsg={txt:'BOSS INCOMING!',life:200,col:'#ff1744'};
  }
  if(tele.bossDead){
    tele.progress++;
    if(tele.progress>=tele.chargeTime) nextStage();
  }
}

function tickSpawn(){
  spawnT++;
  const cd=getSpawnCd();
  if(spawnT<cd) return;
  spawnT=0;

  const pool=getPool();
  const diff=getDiff();
  // How many enemies to spawn this wave (scales with difficulty)
  const waveSize=1+Math.floor(diff*0.7)+(Math.random()<0.3+diff*0.1?1:0);

  for(let w=0;w<waveSize;w++){
    const type=choice(pool);
    // Spawn off-screen: pick left or right edge of the visible area
    const spawnLeft=Math.random()<0.5;
    const offscreenBuffer=rand(50,120);
    const sx=spawnLeft
      ? clamp(player.x - W*0.6 - offscreenBuffer, TILE*2, LW-TILE*2-60)
      : clamp(player.x + W*0.6 + offscreenBuffer, TILE*2, LW-TILE*2-60);

    const flyingTypes=['wisp','jellyfish','floater','phantasm'];
    const sy=flyingTypes.includes(type)
      ? clamp(player.y - rand(60,180), TILE*2, LH-TILE-80)
      : LH-TILE-60;

    const e=spawnEnemy(type, sx, sy);
    // Stagger spawns slightly so they don't all land at once
    if(e&&w>0) e.timer=Math.floor(rand(0,30));
  }
}

function nextStage(){
  stage++;
  if(stage>5){state='victory';return;}
  platforms=genLevel();
  spawnLevelChests();
  enemies=[];projs=[];drops=[];lightnings=[];particles=[];mines=[];tornadoes=[];turrets=[];
  rooms=[];
  tele={x:7596,y:LH-TILE-192,w:64,h:64,active:false,bossSpawned:false,bossDead:false,progress:0,chargeTime:360,glow:0};
  boss=null;
  player.x=120;player.y=LH-TILE-player.h-2;
  player.hp=Math.min(player.maxHp,player.hp+Math.ceil(player.maxHp*0.35));
  spawnT=0;cam.x=0;cam.y=0;
  burst(player.x+player.w/2,player.y,35,'#76ff03',6,70);
  stageMsg={txt:`STAGE ${stage}`,life:200,col:'#76ff03'};
}

// ===== DRAW FUNCTIONS =====
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#040810');g.addColorStop(0.5,'#080f1e');g.addColorStop(1,'#0c1828');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Stars (parallax layer 1 - very slow)
  for(let i=0;i<120;i++){
    const sx=((i*137.5+60)%LW-cam.x*0.05+LW)%(W+50)-25;
    const sy=((i*93.7+15)%(LH*0.8)-cam.y*0.05+LH)%(H+50)-25;
    if(sy>0&&sy<H){ctx.globalAlpha=0.15+Math.sin(gTimer*0.015+i)*0.18;ctx.fillStyle='#fff';ctx.fillRect(sx,sy,1,1);}
  }
  ctx.globalAlpha=1;
  // Distant mountains (parallax layer 2)
  ctx.fillStyle='rgba(10,22,40,0.85)';
  for(let i=0;i<8;i++){
    const mx=((i*600+100-cam.x*0.2)%LW+LW)%(W+300)-150;
    const mh=100+(i*67)%120;
    ctx.fillRect(mx,H-mh-(cam.y*0.1),180,mh+30);
  }
  // Mid-ground structures (parallax layer 3)
  ctx.fillStyle='rgba(12,26,46,0.6)';
  for(let i=0;i<12;i++){
    const mx=((i*420+200-cam.x*0.4)%LW+LW)%(W+200)-100;
    const mh=60+(i*43)%80;
    ctx.fillRect(mx,H-mh-(cam.y*0.25),80,mh+20);
  }
  // Rain streaks
  const t=gTimer*0.016;
  ctx.strokeStyle='rgba(80,140,220,0.08)';ctx.lineWidth=1;
  for(let i=0;i<25;i++){
    const rx=((i*157+t*200)%W),ry=((i*111+t*300)%(H+60))-30;
    ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-3,ry+20);ctx.stroke();
  }
}

function drawPlatforms(){
  for(const p of platforms){
    const px=p.x-cam.x,py=p.y-cam.y;
    if(px+p.w<-2||px>W+2||py+p.h<-2||py>H+2) continue;
    const isGnd=p.y>=LH-TILE;
    const isCeil=p.y<=TILE;
    if(p.semi){
      // Semi-solid: glowing edge-lit plank/rock
      ctx.fillStyle='#1a3550';ctx.fillRect(px,py,p.w,p.h);
      ctx.fillStyle='#2e6090';ctx.fillRect(px,py,p.w,3); // bright top edge
      ctx.fillStyle='rgba(46,96,144,0.4)';ctx.fillRect(px,py+3,p.w,p.h-3);
      ctx.fillStyle='rgba(100,180,255,0.15)';ctx.fillRect(px,py,p.w,2); // glow line
    } else if(isGnd){
      ctx.fillStyle='#0e1e30';ctx.fillRect(px,py,p.w,p.h);
      ctx.fillStyle='#1a3550';ctx.fillRect(px,py,p.w,3);
      ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(px+p.w-2,py+3,2,p.h-3);
    } else if(isCeil){
      ctx.fillStyle='#070f1c';ctx.fillRect(px,py,p.w,p.h);
      ctx.fillStyle='#101e30';ctx.fillRect(px,py+p.h-2,p.w,2);
    } else {
      // Solid mid-level (pillars, walls, cliffs)
      ctx.fillStyle='#0d1a28';ctx.fillRect(px,py,p.w,p.h);
      ctx.fillStyle='#162436';ctx.fillRect(px,py,2,p.h); // left highlight
      ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(px+p.w-2,py,2,p.h); // right shadow
    }
  }
}

function drawTeleporter(){
  const tx=tele.x-cam.x,ty=tele.y-cam.y;
  const g2=Math.sin(tele.glow*0.05)*0.5+0.5;
  if(tele.active){
    ctx.globalAlpha=0.2+g2*0.25;
    ctx.fillStyle=tele.bossDead?'#76ff03':'#4dd0e1';
    ctx.beginPath();ctx.arc(tx+32,ty+32,55+g2*12,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.fillStyle=tele.active?`hsl(${tele.glow*2%360},80%,55%)`:'#263238';
  ctx.fillRect(tx,ty+32,64,32);
  const oc=tele.bossDead?'#76ff03':tele.active?`hsl(${tele.glow*4%360},100%,60%)`:'#4dd0e1';
  ctx.fillStyle=oc;
  ctx.beginPath();ctx.arc(tx+32,ty+32,18+g2*4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.beginPath();ctx.arc(tx+32,ty+32,7,0,Math.PI*2);ctx.fill();
  if(tele.active&&!tele.bossDead){
    ctx.strokeStyle='#76ff03';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(tx+32,ty+32,28,-Math.PI/2,-Math.PI/2+(tele.progress/tele.chargeTime)*Math.PI*2);ctx.stroke();
  }
  if(!tele.active){
    const td=dist({x:player.x+player.w/2,y:player.y+player.h/2},{x:tele.x+32,y:tele.y+32});
    if(td<180){
      ctx.fillStyle='rgba(77,208,225,0.8)';ctx.font='10px monospace';ctx.textAlign='center';
      ctx.fillText('[F] TELEPORTER',tx+32,ty+76);ctx.textAlign='left';
    }
  }
}

function drawDrops(){
  for(const d of drops){
    const dx=d.x-cam.x,dy=d.y-cam.y;
    if(dx+d.w<0||dx>W||dy+d.h<0||dy>H) continue;
    ctx.globalAlpha=0.25+Math.sin(d.bob*0.08)*0.15;
    ctx.fillStyle=d.itm.col;ctx.fillRect(dx-4,dy-4,d.w+8,d.h+8);
    ctx.globalAlpha=1;
    const rc={common:'#546e7a',uncommon:'#388e3c',rare:'#f9a825',boss:'#b71c1c'};
    ctx.fillStyle=rc[d.itm.rar]||'#fff';ctx.fillRect(dx,dy,d.w,d.h);
    ctx.fillStyle=d.itm.col;ctx.fillRect(dx+4,dy+4,d.w-8,d.h-8);
    ctx.strokeStyle=rc[d.itm.rar]||'#fff';ctx.lineWidth=1.5;ctx.strokeRect(dx,dy,d.w,d.h);
    const mwx=mouse.x+cam.x,mwy=mouse.y+cam.y;
    if(mwx>d.x&&mwx<d.x+d.w&&mwy>d.y&&mwy<d.y+d.h){
      ctx.fillStyle='rgba(0,0,0,0.9)';ctx.fillRect(dx-4,dy-36,140,30);
      ctx.fillStyle=d.itm.col;ctx.font='bold 10px monospace';ctx.fillText(d.itm.name,dx+2,dy-22);
      ctx.fillStyle='#aaa';ctx.font='9px monospace';ctx.fillText(d.itm.desc,dx+2,dy-10);

}

function drawSpecials(){
  // Mines
  for(const m of mines){
    const mx=m.x-cam.x,my=m.y-cam.y;
    ctx.fillStyle=m.armed>0?'#607d8b':'#ff9800';
    ctx.fillRect(mx,my,m.w,m.h);
    if(m.armed<=0){
      ctx.globalAlpha=0.5+Math.sin(gTimer*0.2)*0.3;
      ctx.fillStyle='#ff5722';ctx.fillRect(mx+5,my+2,6,4);
      ctx.globalAlpha=1;
    }
  }
  // Tornadoes
  for(const t of tornadoes){
    const tx=t.x-cam.x,ty=t.y-cam.y;
    const alpha=(t.life/300)*0.7;
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#ef9a9a';
    for(let i=0;i<3;i++){
      const a=gTimer*0.1+i*(Math.PI*2/3);
      const r=t.radius*(0.3+i*0.35);
      ctx.beginPath();ctx.arc(tx+Math.cos(a)*r*0.5,ty+Math.sin(a)*r*0.3,8+i*4,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  // Turrets
  for(const t of turrets){
    const tx=t.x-cam.x,ty=t.y-cam.y;
    ctx.fillStyle='#4a148c';ctx.fillRect(tx,ty+8,t.w,t.h-8);
    ctx.fillStyle='#7b1fa2';ctx.fillRect(tx+2,ty,t.w-4,12);
    ctx.fillStyle='#ea80fc';ctx.fillRect(tx+8,ty+3,t.w-16,5);
    // Gun barrel pointing
    ctx.fillStyle='#ce93d8';ctx.fillRect(tx+(t.dir>0?t.w:0)-2,ty+t.h/2-2,10*t.dir,4);
    // HP bar
    ctx.fillStyle='#1a1a1a';ctx.fillRect(tx,ty-6,t.w,3);
    ctx.fillStyle='#ce93d8';ctx.fillRect(tx,ty-6,Math.ceil(t.w*(t.hp/t.maxHp)),3);
  }
  // Heal orbs
  for(const o of healOrbs){
    const ox=o.x-cam.x,oy=o.y-cam.y;
    ctx.globalAlpha=o.life/120;
    ctx.fillStyle='#69f0ae';ctx.beginPath();ctx.arc(ox,oy,5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawEnemies(){
  for(const e of enemies){
    if(!e.alive) continue;
    const ex=e.x-cam.x,ey=e.y-cam.y;
    if(ex+e.w<-60||ex>W+60||ey+e.h<-60||ey>H+60) continue;
    ctx.save();
    if(e.hurtTimer>0) ctx.globalAlpha=0.4+Math.sin(e.hurtTimer*1.2)*0.6;
    if(e.faceL){ctx.scale(-1,1);ctx.translate(-(ex*2+e.w),0);}
    ETYPES[e.type].draw(e,ex,ey);
    ctx.restore();
    // Status indicators
    if(e.poison&&e.poison.stacks>0){ctx.fillStyle='#69f0ae';ctx.fillRect(ex,ey-6,Math.min(e.w,e.poison.stacks*2),2);}
    if(e.stun>0){ctx.fillStyle='#ffee58';ctx.font='8px monospace';ctx.fillText('*',ex+e.w/2-2,ey-6);}
    // HP bar
    const bw=e.w+8,bx=ex-4,by=ey-12;
    ctx.fillStyle='#1a1a1a';ctx.fillRect(bx,by,bw,4);
    ctx.fillStyle=e.hp>e.maxHp*0.5?'#ef5350':'#ff1744';
    ctx.fillRect(bx,by,Math.ceil(bw*(e.hp/e.maxHp)),4);
  }
}

function drawPlayer(){
  if(!player.alive) return;
  const px=player.x-cam.x,py=player.y-cam.y;
  const hurt=player.hurtTimer>0;
  const ch=CHARACTERS[player.charType];
  // Stealth effect
  if(player.stealthed>0) ctx.globalAlpha=0.3;
  // Shield bubble
  if(player.shielded>0){
    ctx.globalAlpha=0.3;ctx.fillStyle='#00e5ff';
    ctx.beginPath();ctx.arc(px+player.w/2,py+player.h/2,32,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.6;ctx.strokeStyle='#00e5ff';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(px+player.w/2,py+player.h/2,32,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  // Shadow
  ctx.globalAlpha=player.stealthed>0?0.15:1;
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(px+2,py+player.h-2,player.w-4,3);
  // Gun
  const cx2=px+player.w/2,cy2=py+player.h*0.42;
  const angle=Math.atan2(mouse.y-cy2,mouse.x-cx2);
  ctx.save();ctx.translate(cx2,cy2);ctx.rotate(angle);
  ctx.fillStyle='#607d8b';ctx.fillRect(0,-3,18,6);
  ctx.fillStyle='#455a64';ctx.fillRect(14,-2,6,4);
  ctx.restore();
  // Character body
  ctx.save();
  if(player.faceL){ctx.scale(-1,1);ctx.translate(-(px*2+player.w),0);}
  ch.draw(player,px,py,hurt);
  ctx.restore();
  // Item aura effects
  if(player.ukulele){
    ctx.strokeStyle=`rgba(255,80,200,${0.2+Math.sin(gTimer*0.05)*0.15})`;
    ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(px+player.w/2,py+player.h/2,28,0,Math.PI*2);ctx.stroke();
  }
  if(player.behemoth){
    ctx.strokeStyle=`rgba(255,80,0,${0.2+Math.sin(gTimer*0.07)*0.15})`;
    ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(px+player.w/2,py+player.h/2,34,0,Math.PI*2);ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawProjs(){
  for(const p of projs){
    const px=p.x-cam.x,py=p.y-cam.y;
    if(px+p.w<-10||px>W+10||py+p.h<-10||py>H+10) continue;
    for(let i=0;i<p.trail.length;i++){
      ctx.globalAlpha=(i/p.trail.length)*0.45;
      ctx.fillStyle=p.col;
      ctx.fillRect(p.trail[i].x-cam.x-1,p.trail[i].y-cam.y-1,3,3);
    }
    ctx.globalAlpha=1;
    ctx.fillStyle=p.col;ctx.fillRect(px,py,p.w,p.h);
    ctx.globalAlpha=0.28;ctx.fillStyle=p.col;ctx.fillRect(px-3,py-3,p.w+6,p.h+6);
    ctx.globalAlpha=1;
  }
}

function drawLightnings(){
  lightnings=lightnings.filter(l=>{
    ctx.strokeStyle=`rgba(200,80,255,${l.life/12})`;ctx.lineWidth=2;
    for(const s of l.segs){
      ctx.beginPath();ctx.moveTo(s.ax-cam.x,s.ay-cam.y);
      const mx2=(s.ax+s.bx)/2+rand(-18,18)-cam.x;
      const my2=(s.ay+s.by)/2+rand(-18,18)-cam.y;
      ctx.quadraticCurveTo(mx2,my2,s.bx-cam.x,s.by-cam.y);ctx.stroke();
    }
    l.life--;return l.life>0;
  });
}

function drawDnums(){
  dnums=dnums.filter(d=>{
    d.y+=d.vy;d.life--;
    ctx.globalAlpha=d.life/d.ml;
    ctx.fillStyle=d.col;
    ctx.font=`bold ${d.txt.length>3?10:13}px monospace`;
    ctx.fillText(d.txt,d.x-cam.x,d.y-cam.y);
    ctx.globalAlpha=1;
    return d.life>0;
  });
}

function drawHUD(){
  const ch=CHARACTERS[player.charType];
  // HP bar
  ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(10,10,204,20);
  const hpPct=player.hp/player.maxHp;
  ctx.fillStyle=hpPct>0.5?'#ef5350':hpPct>0.25?'#ff6d00':'#ff1744';
  ctx.fillRect(12,12,Math.ceil(200*hpPct),16);
  ctx.strokeStyle='#263238';ctx.lineWidth=1;ctx.strokeRect(10,10,204,20);
  ctx.fillStyle='#fff';ctx.font='10px monospace';
  ctx.fillText(`HP: ${Math.ceil(player.hp)} / ${player.maxHp}`,16,23);
  // Shield bar
  if(player.maxShield>0||player.shield>0){
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(10,32,204,6);
    ctx.fillStyle='#29b6f6';ctx.fillRect(12,33,Math.ceil(200*(player.shield/Math.max(player.maxShield,player.shield+1))),4);
    ctx.strokeStyle='#01579b';ctx.strokeRect(10,32,204,6);
  }
  // XP bar
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(10,40,204,5);
  ctx.fillStyle='#76ff03';ctx.fillRect(12,41,Math.ceil(200*(player.xp/player.xpNext)),3);
  ctx.strokeStyle='#263238';ctx.strokeRect(10,40,204,5);
  // Stats
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(10,47,180,16);
  ctx.fillStyle='#b0bec5';ctx.font='10px monospace';
  ctx.fillText(`Lv.${player.lvl}  Score: ${player.score}  Kills: ${player.kills}`,14,58);

  // Character name tag
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(10,65,100,14);
  ctx.fillStyle=ch.col;ctx.font='bold 9px monospace';ctx.fillText(ch.name.toUpperCase(),14,75);

  // Timer
  const sec=Math.floor(gTimer/60);
  const ms=String(Math.floor(sec/60)).padStart(2,'0'),ss=String(sec%60).padStart(2,'0');
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(W/2-42,5,84,18);
  ctx.fillStyle='#80deea';ctx.font='bold 12px monospace';ctx.textAlign='center';
  ctx.fillText(`${ms}:${ss}`,W/2,18);ctx.textAlign='left';

  // Stage & Difficulty
  const diff=getDiff();
  const dcols=['#76ff03','#ffeb3b','#ff9800','#ff5722','#f44336','#b71c1c'];
  const dlabels=['DRIZZLE','RAINSTORM','MONSOON','APOCALYPSE','IMPOSSIBLE','OBLITERATION'];
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W/2-60,26,120,14);
  ctx.fillStyle='#ffd54f';ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillText(`STAGE ${stage}`,W/2,38);ctx.textAlign='left';
  if(diff>0){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W/2-70,43,140,13);
    ctx.fillStyle=dcols[Math.min(diff,5)];ctx.font='9px monospace';ctx.textAlign='center';
    ctx.fillText(dlabels[Math.min(diff,5)],W/2,53);ctx.textAlign='left';
  }

  // Skill icons (bottom)
  const skills=ch.skills;
  const sbx=W/2-60;
  for(let i=0;i<3;i++){
    const sx=sbx+i*46,sy=H-44;
    const cd=player.skillCds[i];
    const pct=cd.cur/cd.max;
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(sx,sy,40,40);
    ctx.fillStyle=cd.cur>0?'rgba(0,0,0,0.5)':skills[i].col;ctx.fillRect(sx+2,sy+2,36,36);
    if(cd.cur>0){
      ctx.fillStyle=skills[i].col;ctx.globalAlpha=0.3;
      ctx.fillRect(sx+2,sy+2+Math.ceil(36*(1-pct)),36,Math.ceil(36*pct));
      ctx.globalAlpha=1;
      ctx.fillStyle='#fff';ctx.font='bold 8px monospace';ctx.textAlign='center';
      ctx.fillText(Math.ceil(cd.cur/60)+'s',sx+20,sy+22);
    } else {
      ctx.fillStyle='#fff';ctx.font='bold 7px monospace';ctx.textAlign='center';
      ctx.fillText(skills[i].key,sx+20,sy+14);
      ctx.font='6px monospace';
      const nm=skills[i].name.length>8?skills[i].name.substring(0,8):skills[i].name;
      ctx.fillText(nm,sx+20,sy+24);
    }
    ctx.strokeStyle=cd.cur>0?'#546e7a':skills[i].col;ctx.lineWidth=1;ctx.strokeRect(sx,sy,40,40);
    ctx.textAlign='left';
  }

  // Items bar
  const seen={};
  let ix=10;
  for(const itm of player.items) seen[itm.id]=(seen[itm.id]||0)+1;
  const ids=Object.keys(seen);
  for(let i=0;i<ids.length&&ix<W-28;i++){
    const itm=ITEMS.find(x=>x.id===ids[i]);if(!itm) continue;
    ctx.fillStyle=itm.col;ctx.fillRect(ix,H-26,20,20);
    ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.strokeRect(ix,H-26,20,20);
    if(seen[ids[i]]>1){ctx.fillStyle='#fff';ctx.font='8px monospace';ctx.fillText(seen[ids[i]],ix+12,H-8);}
    ix+=23;
  }

  // World progress indicator (% across the level)
  const progPct=Math.round((player.x/(LW-TILE*2))*100);
  const nearTele=dist({x:player.x+player.w/2,y:player.y+player.h/2},{x:tele.x+32,y:tele.y+32})<600;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W-130,10,120,14);
  ctx.fillStyle=nearTele?'#4dd0e1':'#78909c';ctx.font='bold 9px monospace';ctx.textAlign='right';
  ctx.fillText(nearTele?'TELEPORTER NEAR':`EXPLORED: ${progPct}%`,W-12,20);ctx.textAlign='left';
  // Nearby enemy count
  const nearEnemies=enemies.filter(e=>e.alive&&Math.abs(e.x-player.x)<600).length;
  if(nearEnemies>0){
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(W-130,26,120,12);
    ctx.fillStyle='#ff5722';ctx.font='9px monospace';ctx.textAlign='right';
    ctx.fillText(`Enemies nearby: ${nearEnemies}`,W-12,35);ctx.textAlign='left';
  }

  // Boss HP
  if(boss&&boss.alive){
    const bw=400,bx=W/2-200,by=H-60;
    ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(bx-2,by-2,bw+4,24);
    const bp=boss.hp/boss.maxHp;
    ctx.fillStyle=bp>0.5?'#b71c1c':'#ff1744';
    ctx.fillRect(bx,by,Math.ceil(bw*bp),20);
    ctx.strokeStyle='#ef5350';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,20);
    ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText(`${boss.name}  ${Math.ceil(boss.hp)} / ${boss.maxHp}`,W/2,by+13);ctx.textAlign='left';
  }

  // Teleporter charge bar
  if(tele.bossDead){
    const pr=Math.min(1,tele.progress/tele.chargeTime);
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(W/2-110,60,220,14);
    ctx.fillStyle='#76ff03';ctx.fillRect(W/2-110,60,Math.ceil(220*pr),14);
    ctx.strokeStyle='#76ff03';ctx.lineWidth=1;ctx.strokeRect(W/2-110,60,220,14);
    ctx.fillStyle='#fff';ctx.font='9px monospace';ctx.textAlign='center';
    ctx.fillText('TELEPORTING TO NEXT STAGE...',W/2,70);ctx.textAlign='left';
  }

  // Minimap
  {
    const mx=W/2-160,my=H-22,mw=320,mh=14;
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(mx-1,my-1,mw+2,mh+2);
    // Level terrain blips
    ctx.fillStyle='#1e3550';ctx.fillRect(mx,my,mw,mh);
    // Semi-solid platforms as bright dots
    for(const p of platforms){
      if(!p.semi) continue;
      const bx=mx+Math.round((p.x/LW)*mw);
      const by=my+Math.round((p.y/LH)*mh);
      ctx.fillStyle='#2e6090';ctx.fillRect(bx,by,2,2);
    }
    // Chests as yellow dots
    for(const ch of chests){
      if(ch.opened) continue;
      const bx=mx+Math.round((ch.x/LW)*mw);
      ctx.fillStyle='#ffd54f';ctx.fillRect(bx,my+2,3,mh-4);
    }
    // Teleporter as cyan dot
    const tbx=mx+Math.round((tele.x/LW)*mw);
    ctx.fillStyle=tele.active?'#76ff03':'#4dd0e1';ctx.fillRect(tbx,my+1,4,mh-2);
    // Player as white dot
    const pbx=mx+Math.round((player.x/LW)*mw);
    ctx.fillStyle='#fff';ctx.fillRect(clamp(pbx,mx,mx+mw-3),my+mh/2-2,3,4);
    // Enemies as red dots
    for(const e of enemies){
      if(!e.alive) continue;
      const ebx=mx+Math.round((e.x/LW)*mw);
      ctx.fillStyle=e.isBoss?'#ff1744':'rgba(239,83,80,0.5)';
      ctx.fillRect(clamp(ebx,mx,mx+mw-2),my+mh/2-1,2,2);
    }
    ctx.strokeStyle='#37474f';ctx.lineWidth=1;ctx.strokeRect(mx,my,mw,mh);
    ctx.fillStyle='#546e7a';ctx.font='7px monospace';ctx.textAlign='left';
    ctx.fillText('[S/↓] drop through platforms',mx,my-2);
    ctx.textAlign='left';
  }

  // Messages
  if(itemMsg){
    itemMsg.life--;
    const a=Math.min(1,itemMsg.life/40);
    ctx.globalAlpha=a;
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(W-232,10,222,42);
    ctx.strokeStyle=itemMsg.col;ctx.lineWidth=1;ctx.strokeRect(W-232,10,222,42);
    ctx.fillStyle=itemMsg.col;ctx.font='bold 12px monospace';ctx.textAlign='right';
    ctx.fillText(itemMsg.txt,W-12,28);
    ctx.fillStyle='#aaa';ctx.font='9px monospace';ctx.fillText(itemMsg.desc,W-12,43);
    ctx.textAlign='left';ctx.globalAlpha=1;
    if(itemMsg.life<=0) itemMsg=null;
  }
  if(lvlMsg){
    lvlMsg.life--;
    const a=Math.min(1,lvlMsg.life/30);
    ctx.globalAlpha=a;
    ctx.fillStyle='#ffeb3b';ctx.font='bold 28px monospace';ctx.textAlign='center';
    ctx.shadowColor='#ffeb3b';ctx.shadowBlur=10;
    ctx.fillText('LEVEL UP!',W/2,H/2-50);
    ctx.shadowBlur=0;ctx.textAlign='left';ctx.globalAlpha=1;
    if(lvlMsg.life<=0) lvlMsg=null;
  }
  if(stageMsg){
    stageMsg.life--;
    const a=Math.min(1,stageMsg.life/40);
    ctx.globalAlpha=a;
    ctx.fillStyle=stageMsg.col||'#4fc3f7';ctx.font='bold 36px monospace';ctx.textAlign='center';
    ctx.shadowColor=stageMsg.col||'#4fc3f7';ctx.shadowBlur=15;
    ctx.fillText(stageMsg.txt,W/2,H/2-70);
    ctx.shadowBlur=0;ctx.textAlign='left';ctx.globalAlpha=1;
    if(stageMsg.life<=0) stageMsg=null;
  }
}

// ===== LEVEL-UP ITEM SELECTION =====
function drawItemSelection(){
  if(!levelUpItemChoices) return;
  // Darken background
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ffd54f';ctx.font='bold 22px monospace';
  ctx.shadowColor='#ffd54f';ctx.shadowBlur=12;
  ctx.fillText('⬡ CHEST — CHOOSE AN ITEM',W/2,80);
  ctx.shadowBlur=0;

  const rarCols={common:'#546e7a',uncommon:'#388e3c',rare:'#f9a825',boss:'#b71c1c'};
  const cardW=180,cardH=110,gap=18;
  const totalW=3*cardW+2*gap;
  const startX=(W-totalW)/2;
  const cardY=H/2-cardH/2-10;

  levelUpItemChoices.choices.forEach((itm,i)=>{
    const cx=startX+i*(cardW+gap);
    const hov=mouse.x>cx&&mouse.x<cx+cardW&&mouse.y>cardY&&mouse.y<cardY+cardH;
    const rc=rarCols[itm.rar]||'#546e7a';
    // Card bg
    ctx.fillStyle=hov?'rgba(255,255,255,0.12)':'rgba(10,20,35,0.92)';
    ctx.fillRect(cx,cardY,cardW,cardH);
    // Rarity border
    ctx.strokeStyle=rc;ctx.lineWidth=hov?2.5:1.5;ctx.strokeRect(cx,cardY,cardW,cardH);
    // Item color swatch
    ctx.fillStyle=itm.col;ctx.fillRect(cx+cardW/2-16,cardY+12,32,32);
    ctx.strokeStyle=rc;ctx.lineWidth=1;ctx.strokeRect(cx+cardW/2-16,cardY+12,32,32);
    // Rarity tag
    ctx.fillStyle=rc;ctx.font='bold 8px monospace';ctx.textAlign='center';
    ctx.fillText(itm.rar.toUpperCase(),cx+cardW/2,cardY+56);
    // Item name
    ctx.fillStyle=hov?itm.col:'#e0e0e0';ctx.font=`bold ${itm.name.length>18?8:9}px monospace`;
    ctx.fillText(itm.name,cx+cardW/2,cardY+70);
    // Item desc
    ctx.fillStyle='#90a4ae';ctx.font='8px monospace';
    // Word wrap desc
    const words=itm.desc.split(' '),lines2=[];let line2='';
    for(const w of words){
      if((line2+w).length>22){lines2.push(line2.trim());line2='';}
      line2+=w+' ';
    }
    lines2.push(line2.trim());
    lines2.forEach((ln,li)=>ctx.fillText(ln,cx+cardW/2,cardY+84+li*10));
    // Hover effect glow
    if(hov){
      ctx.fillStyle=itm.col;ctx.globalAlpha=0.08;ctx.fillRect(cx,cardY,cardW,cardH);ctx.globalAlpha=1;
    }
    ctx.textAlign='left';
  });

  ctx.fillStyle='#607d8b';ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillText('Click a card to choose your item',W/2,cardY+cardH+20);
  ctx.textAlign='left';
}

// ===== CHARACTER SELECT =====
let charSelectHov=null;
const CHAR_KEYS=Object.keys(CHARACTERS);

function drawCharSelect(){
  // Background
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#030810');g.addColorStop(1,'#081525');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Title
  ctx.textAlign='center';
  ctx.shadowColor='#4fc3f7';ctx.shadowBlur=30;
  ctx.fillStyle='#4fc3f7';ctx.font='bold 30px monospace';
  ctx.fillText('RISK OF STORM',W/2,38);
  ctx.shadowBlur=0;
  ctx.fillStyle='#546e7a';ctx.font='9px monospace';
  ctx.fillText('SELECT YOUR SURVIVOR',W/2,54);

  const cols=4,rows=2;
  const cw=168,ch=120,gapx=12,gapy=12;
  const totalW=cols*cw+(cols-1)*gapx;
  const startX=(W-totalW)/2;
  const startY=65;

  CHAR_KEYS.forEach((key,idx)=>{
    const col=idx%cols,row=Math.floor(idx/cols);
    const cx=startX+col*(cw+gapx);
    const cy=startY+row*(ch+gapy);
    const ch_data=CHARACTERS[key];
    const hov=mouse.x>cx&&mouse.x<cx+cw&&mouse.y>cy&&mouse.y<cy+ch;
    const sel=selectedChar===key;
    charSelectHov=hov?key:charSelectHov;

    // Card
    ctx.fillStyle=sel?'rgba(40,70,120,0.95)':hov?'rgba(20,40,70,0.9)':'rgba(8,18,32,0.85)';
    ctx.fillRect(cx,cy,cw,ch);
    ctx.strokeStyle=sel?ch_data.col:hov?'rgba(255,255,255,0.3)':'#263238';
    ctx.lineWidth=sel?2.5:1;ctx.strokeRect(cx,cy,cw,ch);

    // Character sprite preview (mini)
    ctx.save();
    ctx.translate(cx+28,cy+68);
    const fakep={x:0,y:0,w:20,h:28,animT:gTimer*0.05,onGround:true,faceL:false,hurtTimer:0,
      bodyCol:ch_data.bodyCol,col:ch_data.col,accentCol:ch_data.accentCol,charType:key,
      shield:0,shielded:0,invincible:0};
    ctx.scale(1.8,1.8);
    ch_data.draw(fakep,-10,-28,false);
    ctx.restore();

    // Name & stats
    ctx.fillStyle=hov||sel?ch_data.col:'#b0bec5';
    ctx.font=`bold 11px monospace`;ctx.textAlign='left';
    ctx.fillText(ch_data.name,cx+56,cy+20);
    ctx.fillStyle='#78909c';ctx.font='8px monospace';

    // HP bar mini
    ctx.fillStyle='#263238';ctx.fillRect(cx+56,cy+26,80,5);
    ctx.fillStyle='#ef5350';ctx.fillRect(cx+56,cy+26,Math.ceil(80*(ch_data.hp/160)),5);
    ctx.fillStyle='#607d8b';ctx.font='7px monospace';ctx.fillText('HP:'+ch_data.hp,cx+56,cy+40);

    // Speed bar mini
    ctx.fillStyle='#263238';ctx.fillRect(cx+56,cy+43,80,5);
    ctx.fillStyle='#76ff03';ctx.fillRect(cx+56,cy+43,Math.ceil(80*((ch_data.spd-3)/(5.5-3))),5);
    ctx.fillStyle='#607d8b';ctx.fillText('SPD',cx+56,cy+57);

    // Skills preview
    ctx.fillStyle='#546e7a';ctx.font='7px monospace';
    ch_data.skills.forEach((s,si)=>{
      const sx=cx+56+si*28,sy=cy+62;
      ctx.fillStyle=s.col;ctx.fillRect(sx,sy,24,20);
      ctx.fillStyle='#000';ctx.font='6px monospace';ctx.textAlign='center';
      ctx.fillText(s.key,sx+12,sy+9);
      ctx.fillText(s.name.substring(0,4),sx+12,sy+18);
      ctx.textAlign='left';
    });

    // Desc (truncated)
    ctx.fillStyle='#455a64';ctx.font='7px monospace';ctx.textAlign='left';
    const descWords=ch_data.desc.split('. ');
    ctx.fillText(descWords[0].substring(0,28),cx+4,cy+ch-10);
    ctx.textAlign='left';
  });

  // Controls hint
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,H-32,W,32);
  ctx.fillStyle='#80cbc4';ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillText('WASD/Arrows: Move & Jump  |  Mouse: Aim  |  Left Click: Attack  |  Q/E/R: Skills  |  F: Interact',W/2,H-18);
  ctx.fillStyle='#546e7a';ctx.fillText('Select a survivor to begin',W/2,H-8);
  ctx.textAlign='left';
}

// ===== MENU / DEAD / VICTORY =====
function drawMenu(){
  const t=gTimer*0.016;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#030810');g.addColorStop(1,'#081525');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(let i=0;i<80;i++){
    const sx=(i*137.5+30)%W,sy=(i*57.3+15)%(H*0.8);
    ctx.globalAlpha=0.2+Math.abs(Math.sin(t*0.7+i))*0.4;
    ctx.fillStyle='#fff';ctx.fillRect(sx,sy,1,1);
  }
  ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(80,130,220,0.2)';ctx.lineWidth=1;
  for(let i=0;i<25;i++){
    const rx=(i*153+t*220)%W,ry=(i*111+t*330)%(H+60)-30;
    ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-4,ry+22);ctx.stroke();
  }
  ctx.textAlign='center';
  ctx.shadowColor='#4fc3f7';ctx.shadowBlur=30;
  ctx.fillStyle='#4fc3f7';ctx.font='bold 54px monospace';
  ctx.fillText('RISK OF STORM',W/2,115);
  ctx.shadowBlur=0;
  ctx.fillStyle='#546e7a';ctx.font='13px monospace';
  ctx.fillText('A Roguelike Platformer · Inspired by Risk of Rain',W/2,142);
  const bhov=mouse.x>W/2-100&&mouse.x<W/2+100&&mouse.y>180&&mouse.y<225;
  ctx.fillStyle=bhov?'#1565c0':'#0d47a1';ctx.fillRect(W/2-100,180,200,45);
  ctx.strokeStyle=bhov?'#4fc3f7':'#1976d2';ctx.lineWidth=2;ctx.strokeRect(W/2-100,180,200,45);
  ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.fillText('SELECT SURVIVOR',W/2,207);
  ctx.textAlign='left';
}

function drawDead(){
  ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowColor='#ef5350';ctx.shadowBlur=25;
  ctx.fillStyle='#ef5350';ctx.font='bold 52px monospace';ctx.fillText('YOU DIED',W/2,120);
  ctx.shadowBlur=0;
  const sec=Math.floor(gTimer/60);
  ctx.fillStyle='#e0e0e0';ctx.font='13px monospace';
  ctx.fillText(`${CHARACTERS[player.charType].name}  |  Survived: ${Math.floor(sec/60)}m ${sec%60}s   Stage: ${stage}`,W/2,165);
  ctx.fillText(`Score: ${player.score}   Kills: ${player.kills}   Level: ${player.lvl}`,W/2,188);
  ctx.fillStyle='#90caf9';ctx.font='11px monospace';
  ctx.fillText(`Items collected: ${player.items.length}`,W/2,210);
  if(player.items.length>0){
    const names=player.items.map(i=>i.name).join(', ');
    ctx.fillStyle='#607d8b';ctx.fillText(names.length>70?names.substring(0,70)+'...':names,W/2,228);
  }
  const bhov=mouse.x>W/2-100&&mouse.x<W/2+100&&mouse.y>255&&mouse.y<300;
  ctx.fillStyle=bhov?'#b71c1c':'#c62828';ctx.fillRect(W/2-100,255,200,45);
  ctx.strokeStyle='#ef5350';ctx.lineWidth=2;ctx.strokeRect(W/2-100,255,200,45);
  ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.fillText('TRY AGAIN',W/2,282);
  ctx.textAlign='left';
}

function drawVictory(){
  ctx.fillStyle='rgba(0,8,4,0.88)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowColor='#76ff03';ctx.shadowBlur=30;
  ctx.fillStyle=`hsl(${gTimer*1.5%360},90%,60%)`;ctx.font='bold 52px monospace';
  ctx.fillText('VICTORY!',W/2,115);ctx.shadowBlur=0;
  ctx.fillStyle='#e0e0e0';ctx.font='14px monospace';
  ctx.fillText(`${CHARACTERS[player.charType].name} escaped the planet!`,W/2,155);
  ctx.fillText(`Score: ${player.score}   Kills: ${player.kills}   Level: ${player.lvl}`,W/2,180);
  ctx.fillText(`Items: ${player.items.length}   Stages Cleared: 5`,W/2,202);
  const bhov=mouse.x>W/2-100&&mouse.x<W/2+100&&mouse.y>260&&mouse.y<305;
  ctx.fillStyle=bhov?'#2e7d32':'#1b5e20';ctx.fillRect(W/2-100,260,200,45);
  ctx.strokeStyle='#76ff03';ctx.lineWidth=2;ctx.strokeRect(W/2-100,260,200,45);
  ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.fillText('PLAY AGAIN',W/2,287);
  ctx.textAlign='left';
}

// ===== CLICK HANDLER =====
c.addEventListener('click',()=>{
  AC.resume();
  if(state==='charselect'){
    // Click on character card to select + start
    const cols=4,cw=168,ch2=120,gapx=12,gapy=12;
    const totalW=cols*cw+(cols-1)*gapx;
    const startX=(W-totalW)/2,startY=65;
    let clicked=false;
    CHAR_KEYS.forEach((key,idx)=>{
      const col=idx%cols,row=Math.floor(idx/cols);
      const cx=startX+col*(cw+gapx),cy=startY+row*(ch2+gapy);
      if(mouse.x>cx&&mouse.x<cx+cw&&mouse.y>cy&&mouse.y<cy+ch2){
        selectedChar=key;startGame();clicked=true;
      }
    });
    return;
  }
  if(state==='menu'){
    const bhov=mouse.x>W/2-100&&mouse.x<W/2+100&&mouse.y>180&&mouse.y<225;
    if(bhov) state='charselect';
    return;
  }
  if(state==='dead'&&mouse.x>W/2-100&&mouse.x<W/2+100&&mouse.y>255&&mouse.y<300){state='charselect';return;}
  if(state==='victory'&&mouse.x>W/2-100&&mouse.x<W/2+100&&mouse.y>260&&mouse.y<305){state='charselect';return;}
  // Level-up item selection
  if(levelUpItemChoices&&state==='playing'){
    const cardW=180,cardH=110,gap=18;
    const totalW=3*cardW+2*gap;
    const startX=(W-totalW)/2,cardY=H/2-cardH/2-10;
    levelUpItemChoices.choices.forEach((itm,i)=>{
      const cx=startX+i*(cardW+gap);
      if(mouse.x>cx&&mouse.x<cx+cardW&&mouse.y>cardY&&mouse.y<cardY+cardH){
        // Apply item
        itm.apply(player);player.items.push(itm);
        SFX.item();
        burst(player.x+player.w/2,player.y+player.h/2,20,itm.col,6,40);
        itemMsg={txt:itm.name,desc:'Chest reward: '+itm.desc,col:itm.col,life:220};
        levelUpItemChoices=null;
      }
    });
  }
});

function startGame(){
  state='playing';
  player=mkPlayer();
  platforms=genLevel();
  spawnLevelChests();
  enemies=[];projs=[];drops=[];particles=[];dnums=[];lightnings=[];
  mines=[];tornadoes=[];turrets=[];healOrbs=[];
  rooms=[];
  gTimer=0;spawnT=0;stage=1;boss=null;
  itemMsg=null;lvlMsg=null;levelUpItemChoices=null;
  // Teleporter deep in the level near the end
  tele={x:7596,y:LH-TILE-192,w:64,h:64,active:false,bossSpawned:false,bossDead:false,progress:0,chargeTime:360,glow:0};
  // Player spawns at left side
  player.x=120;player.y=LH-TILE-player.h-2;
  cam.x=0;cam.y=0;
  stageMsg={txt:'STAGE 1',life:200,col:'#4fc3f7'};
}

// ===== MAIN LOOP =====
function update(){
  if(state!=='playing') return;
  if(levelUpItemChoices) return; // Pause game during item selection
  gTimer++;
  tickPlayer();
  tickEnemies();
  tickProjs();
  tickDrops();
  tickTele();
  tickSpawn();
  tickParticles();
  updateCam(player);
  enemies=enemies.filter(e=>e.alive);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(state==='charselect'){drawCharSelect();return;}
  if(state==='menu'){drawMenu();return;}
  if(state==='dead'){drawDead();return;}
  if(state==='victory'){drawVictory();return;}
  drawBG();
  drawPlatforms();
  drawDoors();
  drawTeleporter();
  drawChests();
  drawDrops();
  drawSpecials();
  drawParticles();
  drawLightnings();
  drawEnemies();
  drawPlayer();
  drawProjs();
  drawDnums();
  drawHUD();
  if(levelUpItemChoices) drawItemSelection();
}

// Fixed 60fps timestep
const TARGET_FPS=60,FRAME_MS=1000/TARGET_FPS;
let lastTime=0,accumulator=0;
function loop(timestamp){
  requestAnimationFrame(loop);
  const delta=Math.min(timestamp-lastTime,100);
  lastTime=timestamp;
  accumulator+=delta;
  while(accumulator>=FRAME_MS){update();accumulator-=FRAME_MS;}
  draw();
}
requestAnimationFrame(loop);
</script>
