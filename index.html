function drawCharSelect(){
  // Background
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#030810');g.addColorStop(1,'#081525');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Title
  ctx.textAlign='center';
  ctx.shadowColor='#4fc3f7';ctx.shadowBlur=30;
  ctx.fillStyle='#4fc3f7';ctx.font='bold 30px monospace';
  ctx.fillText('RISK OF STORM',W/2,38);
  ctx.shadowBlur=0;
  ctx.fillStyle='#546e7a';ctx.font='9px monospace';
  ctx.fillText('SELECT YOUR SURVIVOR',W/2,54);

  const cols=4,rows=2;
  const cw=168,ch=120,gapx=12,gapy=12;
  const totalW=cols*cw+(cols-1)*gapx;
  const startX=(W-totalW)/2;
  const startY=65;

  CHAR_KEYS.forEach((key,idx)=>{
    const col=idx%cols,row=Math.floor(idx/cols);
    const cx=startX+col*(cw+gapx);
    const cy=startY+row*(ch+gapy);
    const ch_data=CHARACTERS[key];
    const hov=mouse.x>cx&&mouse.x<cx+cw&&mouse.y>cy&&mouse.y<cy+ch;
    const sel=selectedChar===key;
    charSelectHov=hov?key:charSelectHov;

    // Card
    ctx.fillStyle=sel?'rgba(40,70,120,0.95)':hov?'rgba(20,40,70,0.9)':'rgba(8,18,32,0.85)';
    ctx.fillRect(cx,cy,cw,ch);
    ctx.strokeStyle=sel?ch_data.col:hov?'rgba(255,255,255,0.3)':'#263238';
    ctx.lineWidth=sel?2.5:1;ctx.strokeRect(cx,cy,cw,ch);

    // Character sprite preview (mini)
    ctx.save();
    ctx.translate(cx+28,cy+68);
    const fakep={x:0,y:0,w:20,h:28,animT:gTimer*0.05,onGround:true,faceL:false,hurtTimer:0,
      bodyCol:ch_data.bodyCol,col:ch_data.col,accentCol:ch_data.accentCol,charType:key,
      shield:0,shielded:0,invincible:0};
    ctx.scale(1.8,1.8);
    ch_data.draw(fakep,-10,-28,false);
    ctx.restore();

    // Name — shrink font until it fits
    const nameX=cx+56,nameMaxW=cw-60;
    ctx.fillStyle=hov||sel?ch_data.col:'#cfd8dc';
    let nf=11;
    ctx.font=`bold ${nf}px monospace`;
    while(ctx.measureText(ch_data.name).width>nameMaxW&&nf>7){nf--;ctx.font=`bold ${nf}px monospace`;}
    ctx.textAlign='left';
    ctx.fillText(ch_data.name,nameX,cy+20);
    ctx.fillStyle='#78909c';ctx.font='8px monospace';

    // HP bar mini
    ctx.fillStyle='#263238';ctx.fillRect(nameX,cy+26,nameMaxW,5);
    ctx.fillStyle='#ef5350';ctx.fillRect(nameX,cy+26,Math.ceil(nameMaxW*(ch_data.hp/160)),5);
    ctx.fillStyle='#607d8b';ctx.font='7px monospace';ctx.fillText('HP:'+ch_data.hp,nameX,cy+40);

    // Speed bar mini
    ctx.fillStyle='#263238';ctx.fillRect(nameX,cy+43,nameMaxW,5);
    ctx.fillStyle='#76ff03';ctx.fillRect(nameX,cy+43,Math.ceil(nameMaxW*((ch_data.spd-3)/(5.5-3))),5);
    ctx.fillStyle='#607d8b';ctx.fillText('SPD',nameX,cy+57);

    // Skills preview
    ctx.fillStyle='#546e7a';ctx.font='7px monospace';
    ch_data.skills.forEach((s,si)=>{
      const sx=nameX+si*28,sy=cy+62;
      ctx.fillStyle=s.col;ctx.fillRect(sx,sy,24,20);
      ctx.fillStyle='#000';ctx.font='6px monospace';ctx.textAlign='center';
      ctx.fillText(s.key,sx+12,sy+9);
      ctx.fillText(s.name.substring(0,4),sx+12,sy+18);
      ctx.textAlign='left';
    });

    // Desc (truncated)
    ctx.fillStyle='#455a64';ctx.font='7px monospace';ctx.textAlign='left';
    const descWords=ch_data.desc.split('. ');
    ctx.fillText(descWords[0].substring(0,28),cx+4,cy+ch-10);
    ctx.textAlign='left';
  });

  // Controls hint
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,H-32,W,32);
  ctx.fillStyle='#80cbc4';ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillText('WASD/Arrows: Move & Jump  |  Mouse: Aim  |  Left Click: Attack  |  Q/E/R: Skills  |  F: Interact',W/2,H-18);
  ctx.fillStyle='#546e7a';ctx.fillText('Click a card to preview character — then confirm to start',W/2,H-8);
  ctx.textAlign='left';
}

// ── Character detail preview ──────────────────────────────────
function drawCharDetail(){
  if(!charDetailKey) return;
  const cd=CHARACTERS[charDetailKey];
  const g2=ctx.createLinearGradient(0,0,0,H);
  g2.addColorStop(0,'#030810');g2.addColorStop(1,'#081525');
  ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=0.07;ctx.fillStyle=cd.col;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;

  // Title
  ctx.textAlign='center';
  ctx.shadowColor=cd.col;ctx.shadowBlur=22;
  ctx.fillStyle=cd.col;ctx.font='bold 30px monospace';
  ctx.fillText(cd.name.toUpperCase(),W/2,44);
  ctx.shadowBlur=0;
  ctx.fillStyle='#78909c';ctx.font='10px monospace';
  ctx.fillText(cd.desc,W/2,62);
  ctx.textAlign='left';

  // Large character sprite
  const sprX=W/2-280,sprY=H/2+30;
  ctx.save();ctx.translate(sprX,sprY);
  const fp={x:0,y:0,w:20,h:28,animT:gTimer*0.05,onGround:true,faceL:false,hurtTimer:0,
    bodyCol:cd.bodyCol,col:cd.col,accentCol:cd.accentCol,charType:charDetailKey,
    shield:0,shielded:0,invincible:0};
  ctx.scale(5,5);cd.draw(fp,-10,-28,false);ctx.restore();

  // Stats panel
  const stX=W/2-220,stY=80,stW=150,stH=110;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(stX,stY,stW,stH);
  ctx.strokeStyle=cd.col;ctx.lineWidth=1;ctx.strokeRect(stX,stY,stW,stH);
  ctx.fillStyle=cd.col;ctx.font='bold 9px monospace';ctx.fillText('STATS',stX+8,stY+14);
  const sts=[['HP',cd.hp],['Speed',cd.spd.toFixed(1)],['Crit',Math.round(cd.crit*100)+'%'],['AtkSpd',cd.atkSpd.toFixed(2)]];
  sts.forEach(([k,v],i)=>{
    ctx.fillStyle='#607d8b';ctx.font='8px monospace';ctx.fillText(k+':',stX+8,stY+30+i*18);
    ctx.fillStyle='#e0e0e0';ctx.fillText(String(v),stX+stW-10-ctx.measureText(String(v)).width,stY+30+i*18);
  });
  ctx.fillStyle='#263238';ctx.fillRect(stX+8,stY+stH-14,stW-16,6);
  ctx.fillStyle='#ef5350';ctx.fillRect(stX+8,stY+stH-14,Math.ceil((stW-16)*(cd.hp/160)),6);

  // Abilities panel
  const abX=W/2,abY=76,abW=W/2-50,abH=H-abY-92;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(abX,abY,abW,abH);
  ctx.strokeStyle=cd.col;ctx.lineWidth=1;ctx.strokeRect(abX,abY,abW,abH);
  ctx.fillStyle=cd.col;ctx.font='bold 9px monospace';ctx.fillText('ABILITIES',abX+10,abY+15);
  const abils=[
    ...cd.skills.map(s=>({key:s.key,name:s.name,desc:s.desc,col:s.col})),
    ...(cd.special?[{key:'T',name:cd.special.name,desc:cd.special.desc,col:cd.special.col}]:[]),
    {key:'M1',name:cd.weapon.name,desc:cd.weapon.desc,col:cd.weapon.projCol||cd.col}
  ];
  abils.forEach((ab,i)=>{
    const ay=abY+24+i*50;
    if(ay+44>abY+abH) return;
    ctx.fillStyle=ab.col;ctx.fillRect(abX+10,ay,30,30);
    ctx.fillStyle='#000';ctx.font='bold 13px monospace';ctx.textAlign='center';
    ctx.fillText(ab.key,abX+25,ay+20);ctx.textAlign='left';
    ctx.fillStyle='#e0e0e0';ctx.font='bold 10px monospace';ctx.fillText(ab.name,abX+48,ay+12);
    ctx.fillStyle='#78909c';ctx.font='8px monospace';
    // Word wrap
    const words=ab.desc.split(' ');let ln='',ly=ay+26;
    for(const w of words){
      const t=ln?ln+' '+w:w;
      if(ctx.measureText(t).width>abW-58&&ln){ctx.fillText(ln,abX+48,ly);ln=w;ly+=11;}else ln=t;
    }
    if(ln)ctx.fillText(ln,abX+48,ly);
    if(i<abils.length-1){ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(abX+8,ay+47);ctx.lineTo(abX+abW-8,ay+47);ctx.stroke();}
  });

  // Buttons
  const btnY=H-78;
  const confHov=mouse.x>W/2&&mouse.x<W/2+200&&mouse.y>btnY&&mouse.y<btnY+42;
  ctx.fillStyle=confHov?cd.col:cd.col+'99';ctx.fillRect(W/2,btnY,200,42);
  ctx.strokeStyle=cd.col;ctx.lineWidth=2;ctx.strokeRect(W/2,btnY,200,42);
  ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.textAlign='center';
  ctx.fillText('▶ START',W/2+100,btnY+26);ctx.textAlign='left';

  const backHov=mouse.x>W/2-215&&mouse.x<W/2-15&&mouse.y>btnY&&mouse.y<btnY+42;
  ctx.fillStyle=backHov?'#37474f':'#263238';ctx.fillRect(W/2-215,btnY,195,42);
  ctx.strokeStyle='#546e7a';ctx.lineWidth=2;ctx.strokeRect(W/2-215,btnY,195,42);
  ctx.fillStyle='#90a4ae';ctx.font='bold 13px monospace';ctx.textAlign='center';
  ctx.fillText('◀ BACK',W/2-118,btnY+26);ctx.textAlign='left';
}

// ===== MENU / DEAD / VICTORY =====
function drawMenu(){
  const t=gTimer*0.016;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#030810');g.addColorStop(1,'#081525');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(let i=0;i<80;i++){
    const sx=(i*137.5+30)%W,sy=(i*57.3+15)%(H*0.8);
    ctx.globalAlpha=0.2+Math.abs(Math.sin(t*0.7+i))*0.4;
    ctx.fillStyle='#fff';ctx.fillRect(sx,sy,1,1);
  }
  ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(80,130,220,0.2)';ctx.lineWidth=1;
  for(let i=0;i<25;i++){
    const rx=(i*153+t*220)%W,ry=(i*111+t*330)%(H+60)-30;
    ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-4,ry+22);ctx.stroke();
  }
  ctx.textAlign='center';
  ctx.shadowColor='#4fc3f7';ctx.shadowBlur=30;
  ctx.fillStyle='#4fc3f7';ctx.font='bold 54px monospace';
  ctx.fillText('RISK OF STORM',W/2,115);
  ctx.shadowBlur=0;
  ctx.fillStyle='#546e7a';ctx.font='13px monospace';
  ctx.fillText('A Roguelike Platformer · Inspired by Risk of Rain',W/2,142);
  const bhov=mouse.x>W/2-100&&mouse.x<W/2+100&&mouse.y>180&&mouse.y<225;
  ctx.fillStyle=bhov?'#1565c0':'#0d47a1';ctx.fillRect(W/2-100,180,200,45);
  ctx.strokeStyle=bhov?'#4fc3f7':'#1976d2';ctx.lineWidth=2;ctx.strokeRect(W/2-100,180,200,45);
  ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.fillText('SELECT SURVIVOR',W/2,207);
  ctx.textAlign='left';
}

function drawDead(){
  ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowColor='#ef5350';ctx.shadowBlur=25;
  ctx.fillStyle='#ef5350';ctx.font='bold 52px monospace';ctx.fillText('YOU DIED',W/2,80);
  ctx.shadowBlur=0;
  const sec=Math.floor(gTimer/60);
  ctx.fillStyle='#e0e0e0';ctx.font='13px monospace';
  ctx.fillText(`${CHARACTERS[player.charType].name}  |  Survived: ${Math.floor(sec/60)}m ${sec%60}s   Stage: ${stage}`,W/2,120);
  ctx.fillText(`Score: ${player.score}   Kills: ${player.kills}   Level: ${player.lvl}`,W/2,142);
  ctx.fillStyle='#90caf9';ctx.font='11px monospace';
  ctx.fillText(`Items collected: ${player.items.length}`,W/2,162);
  if(player.items.length>0){
    const names=player.items.map(i=>i.name).join(', ');
    ctx.fillStyle='#607d8b';ctx.fillText(names.length>70?names.substring(0,70)+'...':names,W/2,178);
  }
  // TRY AGAIN button
  const btnY=202;
  const bhov=mouse.x>W/2-110&&mouse.x<W/2+110&&mouse.y>btnY&&mouse.y<btnY+44;
  ctx.fillStyle=bhov?'#b71c1c':'#c62828';ctx.fillRect(W/2-110,btnY,220,44);
  ctx.strokeStyle='#ef5350';ctx.lineWidth=2;ctx.strokeRect(W/2-110,btnY,220,44);
  ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.fillText('TRY AGAIN',W/2,btnY+28);

  // Image below button
  const imgW=220,imgH=170;
  const imgX=W/2-imgW/2,imgY=btnY+54;
  if(deathImg.complete&&deathImg.naturalWidth>0){
    ctx.save();
    ctx.beginPath();ctx.rect(imgX,imgY,imgW,imgH);ctx.clip();
    ctx.drawImage(deathImg,imgX,imgY,imgW,imgH);
    ctx.restore();
    ctx.strokeStyle='#ef5350';ctx.lineWidth=2;ctx.strokeRect(imgX,imgY,imgW,imgH);
  }

  // Encouragement text
  const encouragements=['Maybe try not dying this time.','The planet is still winning. Try harder.','Death is just a learning opportunity. A bad one.','Your enemies send their regards.','Get good, survivor.','The teleporter was right there!','That was certainly a run. Not a good one, but a run.','You died doing what you loved: dying.','Even Commando would be disappointed.','Next time, try shooting the enemies.'];
  const msg=encouragements[player.kills%encouragements.length];
  ctx.fillStyle='#ff5252';ctx.font='bold 14px monospace';
  ctx.fillText(msg,W/2,imgY+imgH+28);

  ctx.textAlign='left';
}

function drawVictory(){
  ctx.fillStyle='rgba(0,8,4,0.88)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowColor='#76ff03';ctx.shadowBlur=30;
  ctx.fillStyle=`hsl(${gTimer*1.5%360},90%,60%)`;ctx.font='bold 52px monospace';
  ctx.fillText('VICTORY!',W/2,115);ctx.shadowBlur=0;
  ctx.fillStyle='#e0e0e0';ctx.font='14px monospace';
  ctx.fillText(`${CHARACTERS[player.charType].name} escaped the planet!`,W/2,155);
  ctx.fillText(`Score: ${player.score}   Kills: ${player.kills}   Level: ${player.lvl}`,W/2,180);
  ctx.fillText(`Items: ${player.items.length}   Stages Cleared: 5`,W/2,202);
  const bhov=mouse.x>W/2-100&&mouse.x<W/2+100&&mouse.y>260&&mouse.y<305;
  ctx.fillStyle=bhov?'#2e7d32':'#1b5e20';ctx.fillRect(W/2-100,260,200,45);
  ctx.strokeStyle='#76ff03';ctx.lineWidth=2;ctx.strokeRect(W/2-100,260,200,45);
  ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.fillText('PLAY AGAIN',W/2,287);
  ctx.textAlign='left';
}

// ===== CLICK HANDLER =====
c.addEventListener('click',()=>{
  AC.resume();
  if(state==='charselect'){
    const cols=4;
    const cw=Math.min(200,Math.floor((W-80)/(cols+0.5)));
    const ch2=140,gapx=12,gapy=14;
    const totalW=cols*cw+(cols-1)*gapx;
    const startX=Math.floor((W-totalW)/2),startY=62;
    CHAR_KEYS.forEach((key,idx)=>{
      const col=idx%cols,row=Math.floor(idx/cols);
      const cx=startX+col*(cw+gapx),cy=startY+row*(ch2+gapy);
      if(mouse.x>cx&&mouse.x<cx+cw&&mouse.y>cy&&mouse.y<cy+ch2){
        charDetailKey=key; state='chardetail';
      }
    });
    return;
  }
  if(state==='chardetail'){
    const btnY=H-78;
    // Confirm (START) button: W/2 to W/2+200
    if(mouse.x>W/2&&mouse.x<W/2+200&&mouse.y>btnY&&mouse.y<btnY+42){
      selectedChar=charDetailKey; startGame(); return;
    }
    // Back button: W/2-215 to W/2-15
    if(mouse.x>W/2-215&&mouse.x<W/2-15&&mouse.y>btnY&&mouse.y<btnY+42){
      state='charselect'; return;
    }
    return;
  }
  if(state==='menu'){
    const bhov=mouse.x>W/2-100&&mouse.x<W/2+100&&mouse.y>180&&mouse.y<225;
    if(bhov) state='charselect';
    return;
  }
  if(state==='dead'&&mouse.x>W/2-110&&mouse.x<W/2+110&&mouse.y>202&&mouse.y<246){state='charselect';return;}
  if(state==='victory'&&mouse.x>W/2-100&&mouse.x<W/2+100&&mouse.y>260&&mouse.y<305){state='charselect';return;}
  // Level-up item selection
  if(levelUpItemChoices&&state==='playing'){
    const cardW=180,cardH=110,gap=18;
    const totalW=3*cardW+2*gap;
    const startX=(W-totalW)/2,cardY=H/2-cardH/2-10;
    levelUpItemChoices.choices.forEach((itm,i)=>{
      const cx=startX+i*(cardW+gap);
      if(mouse.x>cx&&mouse.x<cx+cardW&&mouse.y>cardY&&mouse.y<cardY+cardH){
        // Apply item
        itm.apply(player);player.items.push(itm);
        SFX.item();
        burst(player.x+player.w/2,player.y+player.h/2,20,itm.col,6,40);
        itemMsg={txt:itm.name,desc:'Chest reward: '+itm.desc,col:itm.col,life:220};
        levelUpItemChoices=null;
      }
    });
  }
});

function startGame(){
  state='playing';
  paused=false;
  player=mkPlayer();
  platforms=genLevel();
  spawnLevelChests();
  enemies=[];projs=[];drops=[];particles=[];dnums=[];lightnings=[];
  mines=[];tornadoes=[];turrets=[];healOrbs=[];
  rooms=[];
  gTimer=0;spawnT=0;stage=1;boss=null;
  loopCount=0;enemyLoopMul=1;
  itemMsg=null;lvlMsg=null;levelUpItemChoices=null;
  // Teleporter deep in the level near the end
  tele={x:7596,y:LH-TILE-192,w:64,h:64,active:false,bossSpawned:false,bossDead:false,progress:0,chargeTime:360,glow:0};
  // Player spawns at left side
  player.x=120;player.y=LH-TILE-player.h-2;
  cam.x=0;cam.y=0;
  stageMsg={txt:'STAGE 1',life:200,col:'#4fc3f7'};
}

// ===== MAIN LOOP =====
function update(){
  if(state!=='playing') return;
  if(paused) return;
  if(levelUpItemChoices) return; // Pause game during item selection
  gTimer++;
  tickPlayer();
  tickEnemies();
  tickProjs();
  tickDrops();
  tickTele();
  tickSpawn();
  tickParticles();
  updateCam(player);
  enemies=enemies.filter(e=>e.alive);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(state==='charselect'){drawCharSelect();return;}
  if(state==='chardetail'){drawCharDetail();return;}
  if(state==='menu'){drawMenu();return;}
  if(state==='dead'){drawDead();return;}
  if(state==='victory'){drawVictory();return;}
  drawBG();
  drawPlatforms();
  drawDoors();
  drawTeleporter();
  drawChests();
  drawDrops();
  drawSpecials();
  drawParticles();
  drawLightnings();
  drawEnemies();
  drawPlayer();
  drawProjs();
  drawDnums();
  drawModernHUD();
  if(paused) drawPauseOverlay();
  if(levelUpItemChoices) drawItemSelection();
}

// Fixed 60fps timestep
const TARGET_FPS=60,FRAME_MS=1000/TARGET_FPS;
let lastTime=0,accumulator=0;
function loop(timestamp){
  requestAnimationFrame(loop);
  const delta=Math.min(timestamp-lastTime,100);
  lastTime=timestamp;
  accumulator+=delta;
  while(accumulator>=FRAME_MS){update();accumulator-=FRAME_MS;}
  draw();
}
requestAnimationFrame(loop);
</script>
