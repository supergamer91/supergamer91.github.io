// Render at true screen resolution — no CSS scaling, no blur

// ===== AUDIO =====
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,type,dur,vol=0.08){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}
const SFX={
  shoot:()=>beep(900,'square',0.04,0.05),
  hurt:()=>beep(200,'sawtooth',0.15,0.1),
  item:()=>{beep(500,'sine',0.1,0.1);setTimeout(()=>beep(700,'sine',0.1,0.1),80);},
  kill:()=>beep(300,'square',0.08,0.06),
  jump:()=>beep(400,'sine',0.08,0.05),
  boss:()=>beep(80,'sawtooth',1.0,0.2),
  level:()=>{beep(600,'sine',0.2);setTimeout(()=>beep(800,'sine',0.2),100);setTimeout(()=>beep(1000,'sine',0.3),200);},
  die:()=>beep(150,'sawtooth',0.8,0.15),
  ability:()=>beep(660,'triangle',0.12,0.1),
  special:()=>{beep(440,'sawtooth',0.08,0.12);setTimeout(()=>beep(550,'sine',0.15,0.1),60);}
};

const keys={};
const mouse={x:W/2,y:H/2,down:false};
document.addEventListener('keydown',e=>{
  if((e.code==='KeyP'||e.code==='Escape')&&!e.repeat){
    if(state==='playing'&&!levelUpItemChoices){
      paused=!paused;
      mouse.down=false;
    }

  }

});

c.addEventListener('mousemove',e=>{

window.addEventListener('blur',()=>{

// ===== MATH =====
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const rand=(mn,mx)=>Math.random()*(mx-mn)+mn;
const choice=arr=>arr[Math.floor(Math.random()*arr.length)];
const ENEMY_TUNE={hpMul:0.9,dmgMul:0.92,hpScale:0.41,dmgScale:0.2};

// ===== PARTICLES =====
let particles=[];
function burst(x,y,n,col,spd=4,life=35){
  for(let i=0;i<n;i++){
    const a=rand(0,Math.PI*2),s=rand(1,spd);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,ml:life,col,sz:rand(2,5)});
  }
}
function tickParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;return p.life>0;
  });
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/p.ml;
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-cam.x,p.y-cam.y,p.sz,p.sz);
  }
  ctx.globalAlpha=1;
}

    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(cx+2,cy+1,ch.w-4,4);
    ctx.fillStyle=t.glow;
    ctx.fillRect(cx,cy+9,ch.w,3); // band
    ctx.fillRect(cx+ch.w/2-2,cy,4,ch.h); // vertical band

    ctx.fillRect(cx+4,cy+7,5,5);ctx.fillRect(cx+ch.w-9,cy+7,5,5); // hinges
    ctx.fillStyle=t.glow;ctx.fillRect(cx+ch.w/2-4,cy+ch.h/2-3,8,7); // lock
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx+ch.w/2,cy+ch.h/2-3,3,Math.PI,Math.PI*2);ctx.fill();

// ===== LEVEL GENERATION (Risk of Rain 1 inspired open world) =====
// Only floor, ceiling, and left/right boundary walls are solid.
// ALL mid-level platforms are semi-solid (land on top, drop through with S).
// No vertical solid walls anywhere in the traversal path.
let chestPositions=[];
function genLevel(){
  const pl=[];
  chestPositions=[];
  const F=LH-TILE;
  const T=TILE;

  const P=(x,y,tiles)=>{
    for(let i=0;i<tiles;i++)
      pl.push({x:x+i*T,y,w:T,h:T,solid:false,semi:true});
  };
  const S=(x,y,w=1,h=1)=>{
    for(let xi=0;xi<w;xi++) for(let yi=0;yi<h;yi++)
      pl.push({x:x+xi*T,y:y+yi*T,w:T,h:T,solid:true,semi:false});
  };
  // height param: 0=ground, >0=elevated (used to weight chest tier)
  const C=(x,y,height=0)=>chestPositions.push({x,y,height});

  // ── SOLID BOUNDARIES ─────────────────────────────────────────────
  for(let x=0;x<LW;x+=T){ S(x,F); S(x,0); }   // floor + ceiling
  for(let y=T;y<LH;y+=T){ S(0,y); S(LW-T,y); } // left + right walls

  // ════════════════════════════════════════════════════════════════
  // ZONE 1: Crash site  (x 100–1600)  — 2 platforms, 3 ground chests
  // ════════════════════════════════════════════════════════════════
  C(220,  F-36,  0);                         // ground — common
  C(600,  F-36,  0);                         // ground — common
  P(780,  F-256, 5); C(844,  F-292, 256);   // mid platform — rare tier
  P(1150, F-400, 4); C(1214, F-436, 400);   // high platform — legendary
  C(1480, F-36,  0);                         // ground — common

  // ════════════════════════════════════════════════════════════════
  // ZONE 2: Ridge  (x 1700–3000)  — 2 platforms, 2 ground chests
  // ════════════════════════════════════════════════════════════════
  C(1780, F-36,  0);                         // ground — common/uncommon
  P(2050, F-224, 4);
  P(2480, F-416, 5); C(2544, F-452, 416);   // high — legendary
  C(2920, F-36,  0);                         // ground — uncommon

  // ════════════════════════════════════════════════════════════════
  // ZONE 3: Industrial ruins  (x 3100–4600)  — 3 platforms, 2 ground chests
  // ════════════════════════════════════════════════════════════════
  C(3160, F-36,  0);                         // ground — uncommon
  P(3420, F-288, 4);
  P(3880, F-448, 6); C(3976, F-484, 448);   // very high — legendary
  C(4250, F-36,  0);                         // ground — uncommon/rare
  P(4500, F-192, 4); C(4564, F-228, 192);   // mid platform — rare

  // ════════════════════════════════════════════════════════════════
  // ZONE 4: Rock field  (x 4700–6100)  — 2 platforms, 2 ground chests
  // ════════════════════════════════════════════════════════════════
  C(4820, F-36,  0);                         // ground — rare
  P(5150, F-320, 4); C(5214, F-356, 320);   // platform — rare/boss
  P(5660, F-448, 4); C(5724, F-484, 448);   // high — legendary
  C(6050, F-36,  0);                         // ground — rare

  // ════════════════════════════════════════════════════════════════
  // ZONE 5: Boss arena  (x 6200–7800)  — 3 platforms, 2 ground chests
  // ════════════════════════════════════════════════════════════════
  C(6320, F-36,  0);                         // ground — rare/boss
  P(6640, F-288, 5);
  P(7020, F-448, 5); C(7084, F-484, 448);   // legendary perch
  P(7340, F-320, 5); C(7404, F-356, 320);   // platform — rare/boss
  C(7560, F-36,  0);                         // ground — boss

  // Teleporter plinth
  P(7560, F-160, 6);

  return pl;
}

// Chest tiers and costs (RoR1-style)
const CHEST_TIERS=[
  {name:'Common',   col:'#78909c', glow:'#90a4ae', cost:25,  rar:'common'},
  {name:'Uncommon', col:'#1b5e20', glow:'#69f0ae', cost:50,  rar:'uncommon'},
  {name:'Rare',     col:'#0d47a1', glow:'#4fc3f7', cost:90,  rar:'rare'},
  {name:'Legendary',col:'#bf360c', glow:'#ff6d00', cost:150, rar:'legendary'},
  {name:'Boss',     col:'#4a148c', glow:'#ea80fc', cost:250, rar:'boss'},
];
// Assign tiers spaced across the level: early = common, late = rare/legendary
function spawnLevelChests(){
  chests=[];
  chestPositions.forEach((cp)=>{
    const h=cp.height||0;  // 0=ground, higher = more elevated
    const r=Math.random();
    let tier;
    if(h===0){
      // Ground chests: mostly common/uncommon, rare chance of rare
      tier=r<0.55?0:r<0.88?1:r<0.97?2:3;
    } else if(h<250){
      // Low platform: uncommon/rare mix
      tier=r<0.15?0:r<0.50?1:r<0.82?2:r<0.95?3:4;
    } else if(h<400){
      // Mid platform: mostly rare, some legendary
      tier=r<0.05?1:r<0.40?2:r<0.75?3:4;
    } else {
      // High platform (400+): always legendary or boss
      tier=r<0.55?3:4;
    }
    chests.push({x:cp.x,y:cp.y,w:32,h:32,opened:false,bob:0,tier});
  });
}
function resolveCol(e){
  e.onGround=false;
  e.y+=e.vy; e.x+=e.vx;
  e.x=clamp(e.x,TILE,LW-TILE-e.w);
  for(const p of platforms){
    if(e.x+e.w<=p.x||e.x>=p.x+p.w||e.y+e.h<=p.y||e.y>=p.y+p.h) continue;
    if(p.semi){
      // One-way: only land on top when falling downward and feet were above platform top
      const prevBottom=e.y+e.h-e.vy; // where feet were last frame
      if(e.vy>=0&&prevBottom<=p.y+4&&!e.dropThrough){
        e.y=p.y-e.h; e.vy=0; e.onGround=true;
      }
    } else {
      // Solid: full AABB resolution
      const ox=Math.min(e.x+e.w,p.x+p.w)-Math.max(e.x,p.x);
      const oy=Math.min(e.y+e.h,p.y+p.h)-Math.max(e.y,p.y);
      if(ox<oy){e.x=e.x<p.x?p.x-e.w:p.x+p.w;e.vx=0;}
      else{if(e.y<p.y){e.y=p.y-e.h;e.vy=0;e.onGround=true;}else{e.y=p.y+p.h;e.vy=0;}}
    }
  }
  if(e.y+e.h>=LH-TILE){e.y=LH-TILE-e.h;e.vy=0;e.onGround=true;}
  if(e.y<=TILE){e.y=TILE;e.vy=0;}
}

// ===== CAMERA =====
const cam={x:0,y:0};
function updateCam(p){
  const tx=clamp(p.x-W/2+p.w/2,0,LW-W);
  const ty=clamp(p.y-H*0.55+p.h/2,0,LH-H);
  cam.x=lerp(cam.x,tx,0.12);
  cam.y=lerp(cam.y,ty,0.12);
  if(shake>0){cam.x+=rand(-shake,shake);cam.y+=rand(-shake,shake);shake*=0.82;if(shake<0.1)shake=0;}
  cam.x=Math.round(cam.x);
  cam.y=Math.round(cam.y);
}

      use(p){

          return;

        const spreadStacks=src.poison.stacks;
        let hit=0;

          // Spread stacks proportionally — nearby get full, distant get partial

            e.poison.stacks=Math.min(e.poison.stacks+given,30);
            burst(e.x+e.w/2,e.y+e.h/2,14,'#69f0ae',6,30);
            hit++;

        if(hit>0){SFX.special();addShake(4);}

// ===== DROPS & ITEM SELECTION =====
let drops=[];
let levelUpItemChoices=null; // {choices:[itm,itm,itm], selected:null}

function dropItem(x,y,itm){
  drops.push({x:x-12,y:y-16,w:24,h:24,itm,vy:-3,onGround:false,baseY:y-16,bob:0});
}

function giveRandomItem(rar='common'){
  const pool=ITEMS.filter(i=>i.rar===rar);
  return choice(pool);
}

function offerChestItems(rar){
  // Pick 1 item from the chest tier's rarity pool
  // Legendary chests give choice of 3 rare/boss items
  const choices=[];
  if(rar==='legendary'){
    const pool=[...ITEMS.filter(i=>i.rar==='legendary'),...ITEMS.filter(i=>i.rar==='boss')];
    while(choices.length<3&&pool.length){
      const itm=choice(pool);
      if(!choices.find(c=>c.id===itm.id)) choices.push(itm);
    }
  } else {
    // Give a choice of 3 items from that rarity (or fallback to common)
    const pool=ITEMS.filter(i=>i.rar===rar);
    if(!pool.length) pool.push(...ITEMS.filter(i=>i.rar==='common'));
    while(choices.length<3){
      const itm=choice(pool);
      if(!choices.find(c=>c.id===itm.id)) choices.push(itm);
      if(choices.length>=pool.length) break;
    }
  }
  levelUpItemChoices={choices,selected:null,fromChest:true};
}

function offerLevelUpItems(){
  // Offer 3 random items weighted toward rarity
  const choices=[];
  const rarityRoll=()=>{const r=Math.random();return r<0.6?'common':r<0.88?'uncommon':r<0.98?'rare':'boss';};
  while(choices.length<3){
    const rar=rarityRoll();
    const pool=ITEMS.filter(i=>i.rar===rar);
    const itm=choice(pool);
    if(!choices.find(c=>c.id===itm.id)) choices.push(itm);
  }
  levelUpItemChoices={choices,selected:null};
}

// ===== PROJECTILES =====
let projs=[];
function fireProj(x,y,vx,vy,dmg,col,owner,opts={}){
  projs.push({x,y,vx,vy,dmg,col,owner,
    life:opts.life||80,w:opts.w||6,h:opts.h||6,
    isCrit:opts.isCrit||false,homing:opts.homing||false,
    target:opts.target||null,isMissile:opts.isMissile||false,
    isGrenade:opts.isGrenade||false,bouncy:opts.bouncy||false,
    stunBomb:opts.stunBomb||false,pierce:opts.pierce||false,
    contactExplode:opts.contactExplode||false,
    tearGas:opts.tearGas||false,
    blastR:opts.blastR||80,
    explodeCol:opts.explodeCol||col,
    shake:opts.shake||4,
    maxBounces:opts.maxBounces!=null?opts.maxBounces:(opts.bouncy?2:0),
    bounces:opts.bounces||0,bouncesLeft:opts.bounces||0,
    trail:[],bounced:0,gravity:opts.gravity!=null?opts.gravity:(opts.isGrenade?0.4:0)});
}

function explodePlayerGrenade(p){
  const col=p.explodeCol||p.col;
  const r=p.blastR||80;
  // Core burst
  burst(p.x,p.y,28,col,10,50);
  burst(p.x,p.y,16,'#fff',5,22);
  // Ring flash particles outward
  for(let a=0;a<16;a++){
    const ang=(a/16)*Math.PI*2;
    particles.push({x:p.x,y:p.y,vx:Math.cos(ang)*(r/20),vy:Math.sin(ang)*(r/20),life:22,ml:22,col,sz:3});
  }
  addShake(p.shake||6);
  SFX.special();
  for(const e of enemies){
    if(!e.alive) continue;
    if(dist({x:e.x+e.w/2,y:e.y+e.h/2},{x:p.x,y:p.y})<r){
      processHit(e,p.dmg,p.isCrit);
      if(p.stunBomb){e.stun=Math.max(e.stun||0,90);e.vx*=0.25;e.vy=-3;}
    }
  }
}

function spawnEnemy(type,x,y){
  const d=ETYPES[type];if(!d) return null;
  const diff=getDiff();
  const hmul=ENEMY_TUNE.hpMul+diff*ENEMY_TUNE.hpScale,dmul=ENEMY_TUNE.dmgMul+diff*ENEMY_TUNE.dmgScale;
  const e={...d,type,x,y,vx:0,vy:0,onGround:false,
    hp:Math.ceil(d.hp*hmul*enemyLoopMul),maxHp:Math.ceil(d.hp*hmul*enemyLoopMul),
    dmg:Math.ceil(d.dmg*dmul*enemyLoopMul),atkTimer:0,hurtTimer:0,alive:true,
    faceL:false,timer:0,state:'chase',
    poison:null,bleed:null,stun:0};
  if(type==='worm'||type==='colossus'){e.segs=[];for(let i=0;i<18;i++)e.segs.push({x,y});}
  enemies.push(e);return e;
}
